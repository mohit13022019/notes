<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse — Events</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231b3b2e'/><text x='50' y='72' font-size='58' font-weight='bold' text-anchor='middle' fill='%23c8944a' font-family='Georgia,serif'>S</text></svg>">
    <script>
        const REPO_OWNER = 'mohit13022019';
        const REPO_NAME = 'notes';
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNS0aZ6puFPhRqaAGV8ehhG86KQ3jBx7inAHoZvCtMEOg03EY48vxomjCC6PLWVLzUjA/exec';
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800&display=swap');
        :root {
            --bg: #fafaf8; --surface: #ffffff; --surface-alt: #f5f4f1;
            --primary: #1a3728; --accent: #c8944a; --accent-light: #d4a85c;
            --text: #1a1d20; --text-secondary: #5a6070; --text-muted: #949aa8;
            --border: #e8e5df; --border-light: #f0ede8;
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.10);
            --radius-lg: 18px; --radius-xl: 24px; --transition: 0.25s ease;
        }
        body.dark {
            --bg: #0a0d10; --surface: #14171b; --surface-alt: #1a1e23;
            --primary: #c8944a; --accent: #c8944a; --accent-light: #d4a85c;
            --text: #e8eaee; --text-secondary: #a8b0bc; --text-muted: #6a7280;
            --border: #2a2e35; --border-light: #22252b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); transition:background 0.4s; }
        nav {
            background:var(--surface); border-bottom:1px solid var(--border-light);
            padding:0.6rem 2rem; display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:101;
        }
        nav a { text-decoration:none; font-weight:600; font-size:0.85rem; }
        .nav-logo { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--primary); }
        .nav-links { display:flex; gap:1rem; }
        .nav-links a { color:var(--text-secondary); }
        .nav-links a.active { color:var(--accent); }
        .container { max-width:1200px; margin:0 auto; padding:2.5rem 2rem; }
        .page-title { font-family:'Playfair Display',serif; font-size:2.8rem; font-weight:700; color:var(--primary); text-align:center; margin-bottom:2rem; }
        .events-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap:1.5rem; }
        .event-card { background:var(--surface); border-radius:var(--radius-lg); border:1px solid var(--border-light); padding:1.5rem; transition:var(--transition); }
        .event-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-2px); }
        .event-name { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; color:var(--primary); margin-bottom:0.5rem; }
        .event-meta { font-size:0.8rem; color:var(--text-secondary); margin-bottom:0.8rem; display:flex; gap:1rem; }
        .event-desc { font-size:0.85rem; color:var(--text); margin-bottom:1rem; }
        .btn-register { background:var(--accent); color:#fff; border:none; padding:0.5rem 1.2rem; border-radius:50px; font-weight:600; cursor:pointer; }
        .btn-register:hover { background:var(--accent-light); }
        .modal-overlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:200; background:rgba(0,0,0,0.55); backdrop-filter:blur(8px); }
        .modal-overlay.open { display:flex; }
        .modal { background:var(--surface); padding:2rem; border-radius:var(--radius-xl); max-width:450px; width:100%; }
        .modal h3 { font-family:'Playfair Display',serif; color:var(--primary); margin-bottom:1rem; text-align:center; }
        .modal input { width:100%; padding:0.6rem; margin:0.3rem 0 0.8rem; border:2px solid var(--border); border-radius:10px; background:var(--surface-alt); color:var(--text); }
        .btn-submit { background:var(--accent); color:#fff; border:none; padding:0.6rem; border-radius:50px; font-weight:600; width:100%; cursor:pointer; margin-top:0.5rem; }
        .modal-close { float:right; background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text-muted); }
        .toast { position:fixed; bottom:2rem; right:2rem; background:var(--primary); color:#fff; padding:0.6rem 1.2rem; border-radius:50px; font-weight:600; z-index:300; }
        @media (max-width:768px){ .container{padding:1.5rem 1rem;} .page-title{font-size:2rem;} .events-grid{grid-template-columns:1fr;} }
    </style>
</head>
<body class="light">
    <nav>
        <a href="index.html" class="nav-logo">Synapse</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="notes.html">Notes</a>
            <a href="events.html" class="active">Events</a>
            <a href="magazine.html">Magazine</a>
        </div>
    </nav>

    <div class="container" id="eventsContainer">
        <h1 class="page-title">Upcoming Events</h1>
        <div class="events-grid" id="eventsGrid"></div>
    </div>

    <div class="modal-overlay" id="regModal">
        <div class="modal">
            <button class="modal-close" onclick="closeRegModal()">✕</button>
            <h3>Register for <span id="regEventName"></span></h3>
            <input type="text" id="regName" placeholder="Full Name">
            <input type="email" id="regEmail" placeholder="College Email">
            <input type="tel" id="regPhone" placeholder="Phone Number">
            <button class="btn-submit" onclick="submitRegistration()">Register</button>
        </div>
    </div>

    <script>
        let eventsData = [], selectedEventId = null;
        async function fetchEvents() {
            try { const r = await fetch('./events-data.json'); if(r.ok) eventsData = await r.json(); else eventsData = []; } catch(e) { eventsData = []; }
            renderEvents();
        }
        function renderEvents() {
            const grid = document.getElementById('eventsGrid');
            if (!eventsData.length) { grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);">No upcoming events.</p>'; return; }
            grid.innerHTML = eventsData.map(e => `
                <div class="event-card">
                    <div class="event-name">${e.name}</div>
                    <div class="event-meta"><span>📅 ${e.date}</span><span>📍 ${e.location||'TBD'}</span></div>
                    <div class="event-desc">${e.description}</div>
                    <button class="btn-register" onclick="openRegistration('${e.id}')">Register</button>
                </div>
            `).join('');
        }
        function openRegistration(id) {
            const e = eventsData.find(x => x.id === id); if (!e) return;
            selectedEventId = id;
            document.getElementById('regEventName').textContent = e.name;
            document.getElementById('regModal').classList.add('open');
        }
        function closeRegModal() { document.getElementById('regModal').classList.remove('open'); }
        async function submitRegistration() {
            const n = document.getElementById('regName').value.trim();
            const em = document.getElementById('regEmail').value.trim();
            const p = document.getElementById('regPhone').value.trim();
            if (!n || !em || !p) return alert('Fill all fields');
            const ev = eventsData.find(x => x.id === selectedEventId);
            try {
                await fetch(GOOGLE_SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({eventName:ev.name,eventDate:ev.date,studentName:n,email:em,phone:p,timestamp:new Date().toISOString()}) });
                alert('Registered!'); closeRegModal();
            } catch(err) { alert('Failed'); }
        }
        fetchEvents();
    </script>
</body>
</html>
