<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse — Events</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231b3b2e'/><text x='50' y='72' font-size='58' font-weight='bold' text-anchor='middle' fill='%23c8944a' font-family='Georgia,serif'>S</text></svg>">
    <script>
        const REPO_OWNER = 'mohit13022019';   // ← Change this
        const REPO_NAME = 'notes';            // ← Change this
        const TALLY_FORM_URL = 'https://tally.so/r/YOUR_FORM_ID?eventName=Bio-Pictionary'; // ← Change this
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800&display=swap');
        :root {
            --bg:#fafaf8;--surface:rgba(255,255,255,0.8);--surface-alt:rgba(245,244,241,0.7);
            --primary:#1a3728;--accent:#c8944a;--accent-light:#d4a85c;--text:#1a1d20;
            --text-secondary:#5a6070;--text-muted:#949aa8;--border:rgba(232,229,223,0.6);
            --glass-bg:rgba(255,255,255,0.55);--glass-border:rgba(255,255,255,0.5);
            --shadow:0 4px 16px rgba(0,0,0,0.06);--shadow-lg:0 16px 48px rgba(0,0,0,0.10);
            --shadow-xl:0 24px 64px rgba(0,0,0,0.14);--radius-lg:18px;--radius-xl:24px;--radius-2xl:32px;
            --transition:0.25s cubic-bezier(0.4,0,0.2,1);
        }
        body.dark {
            --bg:#0a0d10;--surface:rgba(20,23,27,0.8);--surface-alt:rgba(26,30,35,0.6);
            --primary:#c8944a;--accent:#c8944a;--accent-light:#d4a85c;--text:#e8eaee;
            --text-secondary:#a8b0bc;--text-muted:#6a7280;--border:rgba(42,46,53,0.6);
            --glass-bg:rgba(20,23,27,0.6);--glass-border:rgba(42,46,53,0.5);
            --shadow:0 4px 16px rgba(0,0,0,0.4);--shadow-lg:0 16px 48px rgba(0,0,0,0.5);
            --shadow-xl:0 24px 64px rgba(0,0,0,0.6);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden;transition:background 0.4s,color 0.3s}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @keyframes scaleIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}

        .top-nav{background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);padding:.6rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:101}
        .nav-logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--primary);text-decoration:none;transition:var(--transition)}
        .nav-logo:hover{color:var(--accent)}
        .nav-links{display:flex;gap:1.5rem;align-items:center}
        .nav-links a{color:var(--text-secondary);text-decoration:none;font-weight:600;font-size:.85rem;transition:var(--transition);position:relative;padding:.3rem 0}
        .nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--accent);transition:width 0.3s;border-radius:2px}
        .nav-links a:hover{color:var(--text)}
        .nav-links a:hover::after{width:100%}
        .nav-links a.active{color:var(--accent)}
        .nav-links a.active::after{width:100%}

        .main-container{max-width:1200px;margin:0 auto;padding:3rem 2rem 4rem;position:relative;z-index:1}
        .page-title{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;color:var(--primary);text-align:center;margin-bottom:.3rem;animation:fadeInUp 0.7s ease}
        .page-subtitle{text-align:center;color:var(--text-muted);margin-bottom:2rem;animation:fadeInUp 0.7s ease 0.1s;opacity:0;animation-fill-mode:forwards}

        .action-bar{display:flex;justify-content:center;gap:1rem;margin-bottom:2rem;flex-wrap:wrap;animation:fadeInUp 0.7s ease 0.15s;opacity:0;animation-fill-mode:forwards}
        .btn{padding:.6rem 1.5rem;border-radius:50px;font-weight:600;font-size:.82rem;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:.4rem;background:var(--glass-bg);border:1.5px solid var(--glass-border);color:var(--text-secondary);transition:var(--transition);backdrop-filter:blur(12px)}
        .btn:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--text-muted);color:var(--text)}
        .btn:active{transform:scale(0.96)}
        .btn-accent{background:var(--accent);color:#fff;border:none;font-weight:700;box-shadow:0 4px 16px rgba(200,148,74,0.25)}
        .btn-accent:hover{background:var(--accent-light);box-shadow:0 8px 28px rgba(200,148,74,0.35);color:#fff}

        .events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem}
        .event-card{background:var(--glass-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:var(--radius-xl);border:1px solid var(--glass-border);overflow:hidden;cursor:pointer;transition:var(--transition);box-shadow:var(--shadow);animation:fadeInUp 0.6s ease}
        .event-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-xl);border-color:var(--accent)}
        .event-poster-wrap{width:100%;aspect-ratio:1/1.4;overflow:hidden;background:var(--surface-alt);display:flex;align-items:center;justify-content:center}
        .event-poster{width:100%;height:100%;object-fit:contain}
        .event-poster-placeholder{font-size:3rem;opacity:.4;color:var(--accent)}
        .event-body{padding:1.2rem 1.5rem}
        .event-name{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--primary);margin-bottom:.5rem}
        .event-meta{font-size:.8rem;color:var(--text-secondary);display:flex;gap:1rem;flex-wrap:wrap}
        .event-meta span{display:flex;align-items:center;gap:.3rem}

        .modal-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:200;padding:1.5rem;background:rgba(0,0,0,0);transition:all .35s}
        .modal-overlay.open{display:flex;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
        .detail-modal{background:var(--surface);border-radius:var(--radius-2xl);width:100%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-xl);border:1px solid var(--glass-border);animation:scaleIn .35s ease;backdrop-filter:blur(20px)}
        .detail-poster-wrap{width:100%;background:var(--surface-alt);display:flex;align-items:center;justify-content:center;padding:1rem}
        .detail-poster{max-width:100%;max-height:350px;object-fit:contain}
        .detail-content{padding:2rem}
        .detail-name{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--primary);margin-bottom:.8rem}
        .detail-meta{font-size:.9rem;color:var(--text-secondary);margin-bottom:1rem;display:flex;gap:1.5rem;flex-wrap:wrap}
        .detail-desc{font-size:.95rem;color:var(--text);line-height:1.7;margin-bottom:1.5rem;white-space:pre-wrap}
        .detail-close{float:right;background:0 0;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-muted);padding:.5rem 1rem;transition:var(--transition)}
        .detail-close:hover{color:var(--text);transform:rotate(90deg)}
        .btn-register-lg{background:var(--accent);color:#fff;border:none;padding:.8rem 2rem;border-radius:50px;font-weight:700;cursor:pointer;font-size:.95rem;transition:var(--transition);display:inline-flex;align-items:center;gap:.4rem}
        .btn-register-lg:hover{background:var(--accent-light);transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,148,74,0.3)}

        .modal{background:var(--surface);padding:2rem;border-radius:var(--radius-xl);width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-xl);border:1px solid var(--glass-border);animation:scaleIn .35s ease}
        .modal h3{font-family:'Playfair Display',serif;color:var(--primary);margin-bottom:1.2rem;text-align:center;font-size:1.3rem}
        .modal input,.modal textarea{width:100%;padding:.7rem .9rem;margin:.3rem 0 .7rem;border:2px solid var(--border);border-radius:14px;background:var(--surface-alt);color:var(--text);font-size:.85rem;font-family:'Inter',sans-serif;transition:var(--transition)}
        .modal input:focus,.modal textarea:focus{border-color:var(--accent);outline:0;box-shadow:0 0 0 3px var(--accent-glow, rgba(200,148,74,0.15))}
        .modal-close{float:right;background:0 0;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-muted);transition:var(--transition)}
        .modal-close:hover{color:var(--text);transform:rotate(90deg)}
        .btn-submit{background:var(--accent);color:#fff;border:none;padding:.7rem;border-radius:50px;font-weight:700;width:100%;cursor:pointer;font-size:.9rem;transition:var(--transition)}
        .btn-submit:hover{background:var(--accent-light)}
        .poster-help{font-size:.7rem;color:var(--text-muted);margin-bottom:.5rem}
        .poster-help code{background:var(--surface-alt);padding:.15rem .4rem;border-radius:4px;font-size:.65rem}

        .toast{position:fixed;bottom:2rem;right:2rem;background:var(--primary);color:#fff;padding:.7rem 1.3rem;border-radius:50px;font-weight:600;z-index:300;animation:fadeInUp .3s ease;box-shadow:var(--shadow-lg);font-size:.85rem;display:none}

        .edit-btn{background:var(--accent);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:.55rem;margin-left:.3rem;transition:var(--transition)}
        .edit-btn:hover{background:var(--accent-light)}

        @media(max-width:768px){
            .top-nav{padding:.5rem 1rem}.nav-links{gap:.8rem}.nav-links a{font-size:.7rem}
            .main-container{padding:2rem 1rem 4rem}.page-title{font-size:2.2rem}
            .events-grid{grid-template-columns:1fr}.detail-poster{max-height:250px}
        }
    </style>
</head>
<body class="light">
    <nav class="top-nav">
        <a href="index.html" class="nav-logo">Synapse</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="notes.html">Notes</a>
            <a href="events.html" class="active">Events</a>
            <a href="magazine.html">Magazine</a>
        </div>
    </nav>

    <div class="main-container">
        <h1 class="page-title">Events</h1>
        <p class="page-subtitle">Discover upcoming events and register to participate</p>

        <div class="action-bar" id="adminActionBar" style="display:none;">
            <button class="btn btn-accent" onclick="openAddEventModal()">+ Add Event</button>
            <button class="btn" onclick="adminLogout()">Lock Admin</button>
        </div>
        <div class="action-bar" id="visitorActionBar">
            <button class="btn btn-accent" id="themeToggleBtn">🌓 Toggle Theme</button>
            <button class="btn" onclick="openAdminLogin()">🔐 Admin</button>
        </div>

        <div class="events-grid" id="eventsGrid"></div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailOverlay">
        <div class="detail-modal">
            <button class="detail-close" onclick="closeDetail()">✕</button>
            <div class="detail-poster-wrap"><img class="detail-poster" id="detailPoster" src="" alt=""></div>
            <div class="detail-content">
                <div class="detail-name" id="detailName"></div>
                <div class="detail-meta"><span>📅 <span id="detailDate"></span></span><span>📍 <span id="detailLocation"></span></span></div>
                <div class="detail-desc" id="detailDesc"></div>
                <button class="btn-register-lg" onclick="openTallyForm()">✨ Register Now</button>
            </div>
        </div>
    </div>

    <!-- Admin Login -->
    <div class="modal-overlay" id="adminLoginOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeAdminLogin()">✕</button>
            <h3>Admin Login</h3>
            <input type="password" id="adminPassword" placeholder="Password (btadmin2024)">
            <input type="password" id="githubToken" placeholder="GitHub Token (ghp_...)">
            <button class="btn-submit" onclick="adminLogin()">Login</button>
        </div>
    </div>

    <!-- Add/Edit Event -->
    <div class="modal-overlay" id="addEventOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeAddEvent()">✕</button>
            <h3 id="addEventTitle">Add Event</h3>
            <input type="hidden" id="editEventIndex" value="-1">
            <input type="text" id="newEventName" placeholder="Event Name">
            <input type="text" id="newEventDate" placeholder="Date & Time (e.g., 11th May | 3:15 PM)">
            <input type="text" id="newEventLocation" placeholder="Venue (e.g., BT CR 1)">
            <textarea id="newEventDesc" placeholder="Description (shown when card expands)" rows="3"></textarea>
            <input type="text" id="newEventPoster" placeholder="Poster filename (e.g., poster1.jpg)">
            <p class="poster-help">Upload image to GitHub repo (<code>notes/</code> folder) and paste filename here.</p>
            <button class="btn-submit" onclick="saveEvent()">Save Event</button>
            <hr style="margin:1.2rem 0;border-color:var(--border);">
            <p style="font-weight:700;font-size:.8rem;margin-bottom:.5rem;">Existing Events:</p>
            <div id="adminEventList" style="max-height:200px;overflow-y:auto;font-size:.75rem;"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Theme
        (function(){const s=localStorage.getItem('theme');if(s)document.body.classList.add(s);else{document.body.classList.add(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');}})();
        document.getElementById('themeToggleBtn').addEventListener('click',()=>{document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');});

        function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}

        let eventsData=[],selectedEventId=null,isAdmin=false,githubToken='';

        function getPosterUrl(p){if(!p)return'';if(p.startsWith('http'))return p;return`./${p}`;}

        // ── FETCH & RENDER ──
        async function fetchEvents(){try{const r=await fetch('./events-data.json');if(r.ok)eventsData=await r.json();else eventsData=[];}catch(e){eventsData=[];}renderEvents();}
        function renderEvents(){
            const grid=document.getElementById('eventsGrid');
            if(!eventsData.length){grid.innerHTML='<p style="text-align:center;color:var(--text-muted);font-size:1.1rem;animation:fadeInUp 0.5s ease;">No events yet. Check back soon!</p>';return;}
            grid.innerHTML=eventsData.map((e,i)=>`<div class="event-card" style="animation-delay:${i*.07}s;" onclick="openDetail('${e.id}')"><div class="event-poster-wrap">${getPosterUrl(e.poster)?`<img src="${getPosterUrl(e.poster)}" class="event-poster" onerror="this.parentElement.innerHTML='<div class=event-poster-placeholder>📸</div>';">`:'<div class="event-poster-placeholder">📸</div>'}</div><div class="event-body"><div class="event-name">${e.name}</div><div class="event-meta"><span>📅 ${e.date||'TBA'}</span><span>📍 ${e.location||'TBA'}</span></div></div></div>`).join('');
        }

        // ── DETAIL MODAL ──
        function openDetail(id){const e=eventsData.find(x=>x.id===id);if(!e)return;selectedEventId=id;const pu=getPosterUrl(e.poster);document.getElementById('detailPoster').src=pu||'';document.getElementById('detailName').textContent=e.name;document.getElementById('detailDate').textContent=e.date||'TBA';document.getElementById('detailLocation').textContent=e.location||'TBA';document.getElementById('detailDesc').textContent=e.description||'';document.getElementById('detailOverlay').classList.add('open');}
        function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');}

        // ── TALLY REGISTRATION ──
        function openTallyForm(){const e=eventsData.find(x=>x.id===selectedEventId);if(!e)return;window.open(`${TALLY_FORM_URL}?eventName=${encodeURIComponent(e.name)}`,'_blank');}

        // ── ADMIN ──
        function openAdminLogin(){document.getElementById('adminLoginOverlay').classList.add('open');}
        function closeAdminLogin(){document.getElementById('adminLoginOverlay').classList.remove('open');}
        function adminLogin(){const pw=document.getElementById('adminPassword').value,token=document.getElementById('githubToken').value.trim();if(pw==='btadmin2024'&&token){isAdmin=true;githubToken=token;document.getElementById('adminLoginOverlay').classList.remove('open');document.getElementById('adminActionBar').style.display='flex';document.getElementById('visitorActionBar').style.display='none';showToast('Admin mode activated');}else showToast('Wrong password or token');}
        function adminLogout(){isAdmin=false;githubToken='';document.getElementById('adminActionBar').style.display='none';document.getElementById('visitorActionBar').style.display='flex';showToast('Admin locked');}

        function openAddEventModal(editIndex=-1){
            document.getElementById('editEventIndex').value=editIndex;
            document.getElementById('addEventTitle').textContent=editIndex>=0?'Edit Event':'Add Event';
            if(editIndex>=0){const e=eventsData[editIndex];document.getElementById('newEventName').value=e.name;document.getElementById('newEventDate').value=e.date;document.getElementById('newEventLocation').value=e.location||'';document.getElementById('newEventDesc').value=e.description||'';document.getElementById('newEventPoster').value=e.poster||'';}
            else{document.getElementById('newEventName').value='';document.getElementById('newEventDate').value='';document.getElementById('newEventLocation').value='';document.getElementById('newEventDesc').value='';document.getElementById('newEventPoster').value='';}
            refreshAdminEvents();document.getElementById('addEventOverlay').classList.add('open');
        }
        function closeAddEvent(){document.getElementById('addEventOverlay').classList.remove('open');}

        async function saveEvent(){
            const n=document.getElementById('newEventName').value.trim(),d=document.getElementById('newEventDate').value.trim(),l=document.getElementById('newEventLocation').value.trim(),desc=document.getElementById('newEventDesc').value.trim(),poster=document.getElementById('newEventPoster').value.trim();
            if(!n||!d)return showToast('Name and date/time required');
            const editIndex=parseInt(document.getElementById('editEventIndex').value);
            if(editIndex>=0){eventsData[editIndex]={...eventsData[editIndex],name:n,date:d,location:l,description:desc,poster:poster||null};}
            else{eventsData.push({id:Date.now().toString(),name:n,date:d,location:l,description:desc,poster:poster||null});}
            await commitEvents();renderEvents();refreshAdminEvents();closeAddEvent();showToast(editIndex>=0?'Event updated!':'Event added!');
        }

        async function commitEvents(){
            try{const c=JSON.stringify(eventsData,null,2);const b64=btoa(unescape(encodeURIComponent(c)));const gr=await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/events-data.json`,{headers:{Authorization:`token ${githubToken}`}});const fi=await gr.json();await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/events-data.json`,{method:'PUT',headers:{Authorization:`token ${githubToken}`,'Content-Type':'application/json'},body:JSON.stringify({message:'Update events',content:b64,sha:fi.sha})});}catch(e){showToast('GitHub sync failed. Check your token.');}
        }
        function refreshAdminEvents(){
            const list=document.getElementById('adminEventList');list.innerHTML=eventsData.length?'':'No events yet.';
            eventsData.forEach((e,i)=>{const div=document.createElement('div');div.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:.25rem 0;';div.innerHTML=`<span>${e.name} ${e.poster?'🖼️':''}</span><div><button class="edit-btn" onclick="event.stopPropagation();openAddEventModal(${i})">✎</button><button style="background:#ef4444;color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:.55rem;margin-left:.2rem;" onclick="event.stopPropagation();deleteEvent(${i})">✕</button></div>`;list.appendChild(div);});
        }
        async function deleteEvent(i){if(!confirm('Delete this event?'))return;eventsData.splice(i,1);await commitEvents();renderEvents();refreshAdminEvents();showToast('Event deleted');}
        window.deleteEvent=deleteEvent;

        // Close modals when clicking overlay
        document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',function(e){if(e.target===e.currentTarget){this.classList.remove('open');}});});

        fetchEvents();
    </script>
</body>
</html>
