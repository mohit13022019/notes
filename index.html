        .modal input, .modal select {

        .toast {

            border-radius: 50px; font-size: 0.8rem; font-weight: 600;
            box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease;

        @keyframes toastIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

            .semester-title { font-size: 1.5rem; }
            .subjects-grid { grid-template-columns: 1fr; }
            .sem-tab { padding: 0.5rem 0.9rem; font-size: 0.75rem; }
            .card-expand-inner { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }

        const LAB_CATEGORIES = [{key:'labmanual',label:'Lab Manual'},{key:'folder',label:'Folder'}];
        function isLabSubject(title) { return title.toLowerCase().includes('lab'); }

        let notesData = {}, currentSemester = '3', selectedCardCode = null, isAdmin = false, githubToken = '';

        async function fetchLiveNotes() {
            try {
                const res = await fetch('./notes-data.json');
                if (res.ok) { notesData = await res.json(); }
                else { notesData = JSON.parse(localStorage.getItem('bt_notes')||'{}'); }
            } catch(e) { notesData = JSON.parse(localStorage.getItem('bt_notes')||'{}'); }
            renderAll();
        }

        function saveLocal() { localStorage.setItem('bt_notes', JSON.stringify(notesData)); }
        function getNotesKey(sem,code,cat) { return `${sem}|${code}|${cat}`; }
        function getNotes(sem,code,cat) { return notesData[getNotesKey(sem,code,cat)] || []; }
        function extractFileId(url) { const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/); return m ? m[1] : null; }
        function extractFolderId(url) { const m = url.match(/\/folders\/([a-zA-Z0-9_-]+)/); return m ? m[1] : null; }
        function showToast(msg) { const c=document.getElementById('toastContainer'); const t=document.createElement('div'); t.className='toast'; t.textContent=msg; c.appendChild(t); setTimeout(()=>t.remove(),2500); }

                btn.className = 'sem-tab' + (s.toString()===currentSemester?' active':'');
                const d = SEMESTER_DATA[s];
                const total = (d.subjects?.length||0) + (d.electives ? Object.values(d.electives).flat().length : 0);
                btn.innerHTML = `Sem ${s} <span class="badge">${total}</span>`;
                btn.onclick = ()=>{ currentSemester=s.toString(); selectedCardCode=null; renderAll(); };
                nav.appendChild(btn);
            }
        }
        function renderPanels() {
            const mc = document.getElementById('mainContainer'); mc.innerHTML='';
            for(let s=3; s<=8; s++) {
                const panel = document.createElement('div');
                panel.style.display = s.toString()===currentSemester?'':'none';
                const isSingleCard = selectedCardCode && s.toString()===currentSemester;
                panel.innerHTML = renderSemesterContent(s, isSingleCard);
                mc.appendChild(panel);
            }
            attachCardListeners();
        }
        function renderSemesterContent(sem, isSingleCard) {
            let html = `<div class="semester-header"><h2 class="semester-title">${SEMESTER_DATA[sem].name}</h2>`;
            if (!isSingleCard) {
                html += `<p class="semester-subtitle">Core and elective subjects — click a subject to focus</p>`;
            }
            html += `</div>`;
            if (isSingleCard) {
                html += `<div class="back-bar visible"><button class="btn btn-back" onclick="showAllCards()">← Back to all subjects</button></div>`;
            } else {
                html += `<div class="back-bar"></div>`;
            }
            if (!isSingleCard) {
                html += `<div class="search-bar"><input type="text" placeholder="Search subjects..." oninput="filterCards(this,'${sem}')"></div>`;
            }
            html += `<div class="subjects-grid" id="grid${sem}">`;
            if (isSingleCard) {
                const allSubs = getAllSubjects(sem);
                const sub = allSubs.find(s => s.code === selectedCardCode);
                if (sub) html += renderCard(sem, sub, true);
            } else {
                html += renderAllCards(sem);
            }
            html += '</div>';
            return html;
        }
        function getAllSubjects(sem) {
            const d = SEMESTER_DATA[sem];
            let all = [...(d.subjects||[])];
            if (d.electives) Object.values(d.electives).forEach(arr => all.push(...arr));
            return all;
        }
        function renderAllCards(sem) {
            const d = SEMESTER_DATA[sem]; let html = '';
            if(d.subjects) d.subjects.forEach(s=>html+=renderCard(sem,s,false));
            if(d.electives) for(const [grp,subs] of Object.entries(d.electives)) {
                html += `<div class="elective-group-label">${grp}</div>`;
                subs.forEach(s=>html+=renderCard(sem,s,false));
            }
            return html;
        }
        function renderCard(sem, sub, isSelected) {
            const categories = isLabSubject(sub.title) ? LAB_CATEGORIES : THEORY_CATEGORIES;
            const cardClass = isSelected ? 'subject-card selected-card' : 'subject-card';
            const hiddenClass = selectedCardCode && !isSelected ? ' hidden-card' : '';
            let html = `<div class="${cardClass}${hiddenClass}" data-code="${sub.code}" data-sem="${sem}">
                <div class="card-header">
                    <div class="card-header-left"><div class="card-title">${sub.title}</div><div class="card-code">${sub.code}</div></div>
                    <span class="card-chevron">▾</span>
                </div>
                <div class="card-expand"><div class="card-expand-inner">`;
            categories.forEach(cat=>{
                const notes = getNotes(sem, sub.code, cat.key);
                html += `<div class="note-category"><div class="note-cat-title">${cat.label}</div>`;
                if(notes.length===0) html += '<span class="no-files">Empty</span>';
                else if(cat.key==='folder') {
                    notes.forEach(n=>{
                        const eid = extractFolderId(n.driveUrl);
                        if(eid) html += `<iframe class="folder-embed" src="https://drive.google.com/embeddedfolderview?id=${eid}#list"></iframe>`;
                    });
                } else notes.forEach(n=>html += `<a class="file-link" data-drive-url="${n.driveUrl}" href="javascript:void(0)">${n.label||'File'}</a>`);
                html += '</div>';
            });
            return html + '</div></div></div>';
        }
        function attachCardListeners() {
            document.querySelectorAll('.subject-card:not(.selected-card)').forEach(card=>{
                card.addEventListener('click', function(e) {
                    if(e.target.closest('.file-link')||e.target.closest('iframe')||e.target.closest('button')) return;
                    selectedCardCode = this.getAttribute('data-code');
                    renderPanels();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            });
            document.querySelectorAll('.file-link[data-drive-url]').forEach(link=>{
                link.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const pid = extractFileId(this.getAttribute('data-drive-url'));
                    if(pid) {
                        document.getElementById('previewIframe').src = `https://drive.google.com/file/d/${pid}/preview`;
                        document.getElementById('previewIframe').style.display='';
                        document.getElementById('quickViewInput').style.display='none';
                        document.getElementById('previewModalOverlay').style.display='flex';
                    }
                });
            });
        }
        window.filterCards = function(input, sem) {
            const q = input.value.toLowerCase();
            document.querySelectorAll(`#grid${sem} .subject-card:not(.selected-card)`).forEach(card=>{
                card.style.display = (!q || card.querySelector('.card-title').textContent.toLowerCase().includes(q)) ? '' : 'none';
            });
        };

        function openAdminModal() {
            document.getElementById('adminModalOverlay').style.display='flex';
            populateAdminSemesters();
            if(isAdmin) { document.getElementById('adminAuth').style.display='none'; document.getElementById('adminPanel').style.display=''; updateAdminSubjects(); updateAdminCategoryOptions(); refreshAdminExisting(); }
            else { document.getElementById('adminAuth').style.display=''; document.getElementById('adminPanel').style.display='none'; }
        }
        function closeAdminModal() { document.getElementById('adminModalOverlay').style.display='none'; }
        document.getElementById('adminUploadBtn').addEventListener('click', openAdminModal);
        document.querySelectorAll('.modal-overlay').forEach(o=>{ o.addEventListener('click', function(e){ if(e.target===this){ this.style.display='none'; if(this.id==='previewModalOverlay') closePreview(); } }); });

        function adminLogin() {
            if(document.getElementById('adminPassword').value==='btadmin2024' && (githubToken=document.getElementById('githubToken').value.trim())) {
                isAdmin = true;
                document.getElementById('adminAuth').style.display='none';
                document.getElementById('adminPanel').style.display='';
                updateAdminSubjects(); updateAdminCategoryOptions(); refreshAdminExisting();
                showToast('Admin unlocked');
            } else showToast('Wrong password or token');
        }
        function adminLogout() { isAdmin=false; document.getElementById('adminAuth').style.display=''; document.getElementById('adminPanel').style.display='none'; }
        function populateAdminSemesters() {
            const sel=document.getElementById('adminSemester'); sel.innerHTML='';
            for(let s=3;s<=8;s++) { const o=document.createElement('option'); o.value=s; o.textContent='Semester '+s; sel.appendChild(o); }
        }
        function updateAdminSubjects() {
            const d=SEMESTER_DATA[parseInt(document.getElementById('adminSemester').value)];
            const sel=document.getElementById('adminSubject'); sel.innerHTML='';
            [...(d.subjects||[]),...(d.electives?Object.values(d.electives).flat():[])].forEach(s=>{
                const o=document.createElement('option'); o.value=s.code; o.textContent=s.code+' - '+s.title; o.dataset.title=s.title; sel.appendChild(o);
            });
        }
        function updateAdminCategoryOptions() {
            const sel=document.getElementById('adminCategory');
            const opt=document.getElementById('adminSubject').selectedOptions[0];
            const cats=isLabSubject(opt?opt.dataset.title||opt.textContent.split(' - ')[1]||'':'')?LAB_CATEGORIES:THEORY_CATEGORIES;
            sel.innerHTML=''; cats.forEach(c=>{ const o=document.createElement('option'); o.value=c.key; o.textContent=c.label; sel.appendChild(o); });
            refreshAdminExisting();
        }
        function refreshAdminExisting() {
            const notes=getNotes(document.getElementById('adminSemester').value,document.getElementById('adminSubject').value,document.getElementById('adminCategory').value);
            const div=document.getElementById('adminExistingFiles'); div.innerHTML=notes.length?'':'No files yet.';
            notes.forEach((n,i)=>{
                const d=document.createElement('div');
                d.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:0.25rem 0;';
                d.innerHTML=`<span>${n.label}</span><button style="background:#ef4444;color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:0.6rem;">x</button>`;
                d.querySelector('button').onclick=()=>{
                    const key=getNotesKey(document.getElementById('adminSemester').value,document.getElementById('adminSubject').value,document.getElementById('adminCategory').value);
                    if(notesData[key]){notesData[key].splice(i,1);if(!notesData[key].length)delete notesData[key];saveLocal();refreshAdminExisting();renderPanels();showToast('Deleted');}
                };
                div.appendChild(d);
            });
        }
        async function adminAddAndCommit() {
            const sem=document.getElementById('adminSemester').value, code=document.getElementById('adminSubject').value;
            const cat=document.getElementById('adminCategory').value, label=document.getElementById('adminLabel').value.trim();
            const url=document.getElementById('adminDriveLink').value.trim();
            if(!label||!url) return showToast('Fill all fields');
            if(cat==='folder'&&!extractFolderId(url)) return showToast('Invalid folder link');
            if(cat!=='folder'&&!extractFileId(url)) return showToast('Invalid file link');
            const key=getNotesKey(sem,code,cat);
            if(!notesData[key]) notesData[key]=[];
            notesData[key].push({label, driveUrl:url, addedAt:Date.now()}); saveLocal();
            try {
                const content=JSON.stringify(notesData,null,2);
                const base64=btoa(unescape(encodeURIComponent(content)));
                const getRes=await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/notes-data.json`,{headers:{Authorization:`token ${githubToken}`}});
                const fi=await getRes.json();
                await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/notes-data.json`,{method:'PUT',headers:{Authorization:`token ${githubToken}`,'Content-Type':'application/json'},body:JSON.stringify({message:'Update notes',content:base64,sha:fi.sha})});
                showToast('Published!');
            } catch(e) { showToast('Saved locally'); }
            refreshAdminExisting(); renderPanels();
            document.getElementById('adminLabel').value=''; document.getElementById('adminDriveLink').value='';
        }
        function exportJSON() {
            const blob=new Blob([JSON.stringify(notesData,null,2)],{type:'application/json'});
            const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='notes-data.json'; a.click();
        }
        function importJSON(e) {
            const f=e.target.files[0]; if(!f) return;
            const r=new FileReader();
            r.onload=ev=>{notesData=JSON.parse(ev.target.result);saveLocal();renderPanels();refreshAdminExisting();showToast('Imported');};
            r.readAsText(f); e.target.value='';
        }

        document.getElementById('quickViewBtn').addEventListener('click',()=>{
            document.getElementById('previewIframe').style.display='none';
            document.getElementById('quickViewInput').style.display='';
            document.getElementById('previewModalOverlay').style.display='flex';
        });
        function closePreview() {
            document.getElementById('previewModalOverlay').style.display='none';
            document.getElementById('previewIframe').src=''; document.getElementById('previewIframe').style.display='none';
        }
        window.quickPreview=function(){
            const id=extractFileId(document.getElementById('quickDriveLink').value.trim());
            if(id){
                document.getElementById('previewIframe').src=`https://drive.google.com/file/d/${id}/preview`;
                document.getElementById('previewIframe').style.display='';
                document.getElementById('quickViewInput').style.display='none';
            } else showToast('Invalid link');
        };

        document.getElementById('themeToggle').addEventListener('click',()=>{
            document.body.classList.toggle('dark');
            localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
        });
        (()=>{const t=localStorage.getItem('theme')||'light';document.body.classList.add(t);})();
        fetchLiveNotes();
    </script>
</body>
</html>
