<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse — BMSCE Biotech Club</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231b3b2e'/><text x='50' y='72' font-size='58' font-weight='bold' text-anchor='middle' fill='%23c8944a' font-family='Georgia,serif'>S</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f1f18 0%, #1a3728 40%, #0d1c15 100%);
            color: #fff; min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 2rem;
            overflow-x: hidden;
        }
        .logo {
            font-family: 'Playfair Display', serif; font-size: 4rem; font-weight: 700;
            background: linear-gradient(135deg, #c8944a, #e0b96b, #c8944a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 1.5rem; letter-spacing: -2px;
        }
        .tagline { font-size: 1.8rem; font-weight: 300; margin-bottom: 1rem; opacity: 0.9; }
        .desc { font-size: 1.1rem; opacity: 0.7; max-width: 500px; margin-bottom: 3rem; line-height: 1.6; }
        .btn-group { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 1rem 2.5rem; border-radius: 50px; font-weight: 700; font-size: 1rem;
            cursor: pointer; border: none; transition: all 0.3s; text-decoration: none;
            display: inline-block; font-family: 'Inter', sans-serif;
        }
        .btn-notes { background: #c8944a; color: #0f1f18; }
        .btn-notes:hover { background: #d4a85c; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(200,148,74,0.5); }
        .btn-events { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.4); }
        .btn-events:hover { background: rgba(255,255,255,0.1); border-color: #fff; transform: translateY(-2px); }
        .btn-magazine { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.4); }
        .btn-magazine:hover { background: rgba(255,255,255,0.1); border-color: #fff; transform: translateY(-2px); }
        .footer-text { margin-top: 4rem; font-size: 0.8rem; opacity: 0.5; }
        @media (max-width: 600px) {
            .logo { font-size: 2.5rem; }
            .tagline { font-size: 1.3rem; }
            .btn { padding: 0.8rem 1.8rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="logo">Synapse</div>
    <div class="tagline">The Biotech Club of BMSCE</div>
    <div class="desc">Access semester notes, register for events, and explore the monthly magazine — all in one place.</div>
    <div class="btn-group">
        <a href="notes.html" class="btn btn-notes">Notes</a>
        <a href="events.html" class="btn btn-events">Events</a>
        <a href="magazine.html" class="btn btn-magazine">Magazine</a>
    </div>
    <div class="footer-text">Department of Biotechnology · BMSCE</div>
</body>
</html>
