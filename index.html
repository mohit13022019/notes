<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231b3b2e'/><text x='50' y='72' font-size='58' font-weight='bold' text-anchor='middle' fill='%23c8944a' font-family='Georgia,serif'>S</text></svg>">
    <script>
        const REPO_OWNER = 'mohit13022019';
        const REPO_NAME = 'notes';
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --bg: #fafaf8;
            --surface: #ffffff;
            --surface-alt: #f5f4f1;
            --primary: #1a3728;
            --primary-light: #2a5540;
            --accent: #c8944a;
            --accent-light: #d4a85c;
            --accent-pale: #fef9f2;
            --accent-glow: rgba(200,148,74,0.12);
            --text: #1a1d20;
            --text-secondary: #5a6070;
            --text-muted: #949aa8;
            --border: #e8e5df;
            --border-light: #f0ede8;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.03);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.08);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.10);
            --shadow-xl: 0 24px 64px rgba(0,0,0,0.14);
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 18px;
            --radius-xl: 24px;
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
        }

        body.dark {
            --bg: #0a0d10;
            --surface: #14171b;
            --surface-alt: #1a1e23;
            --primary: #c8944a;
            --primary-light: #d4a85c;
            --accent: #c8944a;
            --accent-light: #d4a85c;
            --accent-pale: #1e1810;
            --text: #e8eaee;
            --text-secondary: #a8b0bc;
            --text-muted: #6a7280;
            --border: #2a2e35;
            --border-light: #22252b;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow: 0 4px 16px rgba(0,0,0,0.4);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.5);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.6);
            --shadow-xl: 0 24px 64px rgba(0,0,0,0.7);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text); line-height:1.6;
            transition: background 0.4s, color 0.3s;
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

        /* ========== LANDING PAGE ========== */
        .landing-page {
            position: fixed; inset:0; z-index:1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f1f18 0%, #1a3728 40%, #0d1c15 100%);
            color: #fff; text-align: center; padding: 2rem;
            transition: opacity 0.5s, visibility 0.5s;
        }
        body.dark .landing-page { background: linear-gradient(135deg, #050a08 0%, #0a1510 40%, #030605 100%); }
        .landing-page.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .landing-logo {
            font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight:700;
            background: linear-gradient(135deg, #c8944a, #e0b96b, #c8944a); -webkit-background-clip:text;
            -webkit-text-fill-color:transparent; background-clip:text;
            margin-bottom:1.5rem; letter-spacing:-1px;
        }
        .landing-tagline {
            font-size:1.8rem; font-weight:300; margin-bottom:1rem;
            opacity:0.9; max-width:600px;
        }
        .landing-desc {
            font-size:1.1rem; opacity:0.7; max-width:500px; margin-bottom:2.5rem; line-height:1.6;
        }
        .btn-enter {
            padding: 0.9rem 2.5rem; border-radius: 50px; font-weight:700; font-size:1rem;
            background: var(--accent); color: #0f1f18; border:none; cursor:pointer;
            transition: background 0.3s, transform 0.2s; box-shadow: 0 8px 30px rgba(200,148,74,0.4);
        }
        .btn-enter:hover { background: var(--accent-light); transform: translateY(-2px); }

        /* ========== MAIN PORTAL (hidden initially) ========== */
        .main-portal { display:none; }
        .main-portal.visible { display:block; }

        /* (All previous styles – header, semester nav, cards, modals, etc. remain exactly the same) */
        /* They are included below for completeness */
        .header { background: var(--surface); border-bottom:1px solid var(--border-light); padding:0 2rem; position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); background:rgba(255,255,255,0.92); }
        body.dark .header { background:rgba(20,23,27,0.92); }
        .header-inner { max-width:1440px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:64px; gap:1.5rem; }
        .logo { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; color:var(--primary); cursor:pointer; white-space:nowrap; }
        .logo:hover { color:var(--accent); }
        .logo-dot { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; margin-left:2px; vertical-align:middle; animation:dotPulse 2s ease-in-out infinite; }
        @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.5)} }
        .header-actions { display:flex; align-items:center; gap:0.5rem; }
        .btn { padding:0.55rem 1.2rem; border-radius:50px; font-weight:600; font-size:0.8rem; cursor:pointer; border:none; transition:var(--transition); font-family:'Inter',sans-serif; white-space:nowrap; }
        .btn:active { transform:scale(0.96); }
        .btn-ghost { background:transparent; color:var(--text-secondary); border:1.5px solid var(--border); }
        .btn-ghost:hover { background:var(--surface-alt); color:var(--text); }
        .btn-accent { background:var(--accent); color:#fff; font-weight:700; box-shadow:0 2px 12px rgba(200,148,74,0.3); }
        .btn-accent:hover { background:var(--accent-light); transform:translateY(-2px); box-shadow:0 6px 24px rgba(200,148,74,0.4); }
        .btn-icon { width:38px; height:38px; border-radius:50%; background:transparent; border:1.5px solid var(--border); color:var(--text-secondary); cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
        .btn-icon:hover { background:var(--surface-alt); border-color:var(--text-muted); color:var(--text); }

        .global-search-wrap { background:var(--surface); border-bottom:1px solid var(--border-light); padding:0.7rem 1.5rem; position:sticky; top:64px; z-index:89; display:flex; align-items:center; justify-content:center; }
        .global-search-inner { position:relative; width:100%; max-width:560px; }
        .global-search-inner input { width:100%; padding:0.65rem 1.2rem 0.65rem 2.5rem; border:2px solid var(--border); border-radius:50px; background:var(--surface-alt); color:var(--text); font-size:0.85rem; outline:none; transition:var(--transition); }
        .global-search-inner input:focus { border-color:var(--accent); background:var(--surface); box-shadow:0 0 0 4px var(--accent-glow); }
        .global-search-inner .search-icon { position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--text-muted); }
        .global-search-inner .clear-btn { position:absolute; right:0.8rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; }

        .semester-nav { background:var(--surface); border-bottom:1px solid var(--border-light); position:sticky; top:128px; z-index:88; padding:0.5rem 1.5rem; display:flex; gap:0.3rem; overflow-x:auto; scrollbar-width:none; }
        .semester-nav::-webkit-scrollbar { display:none; }
        .sem-tab { padding:0.5rem 1.1rem; border-radius:50px; border:none; background:transparent; color:var(--text-secondary); font-weight:600; font-size:0.78rem; cursor:pointer; white-space:nowrap; transition:var(--transition); }
        .sem-tab:hover { background:var(--surface-alt); color:var(--text); }
        .sem-tab.active { background:var(--primary); color:#fff; box-shadow:var(--shadow); }
        .sem-tab .badge { display:inline-block; background:rgba(255,255,255,0.2); padding:0.1rem 0.4rem; border-radius:12px; margin-left:0.3rem; font-size:0.62rem; }

        .main-container { max-width:1440px; margin:0 auto; padding:2.5rem 2rem 4rem; position:relative; z-index:1; }
        .semester-panel { animation:fadeSlideIn 0.4s ease forwards; }
        @keyframes fadeSlideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        .card-enter { animation:cardEnter 0.5s ease forwards; opacity:0; }
        @keyframes cardEnter { from{opacity:0;transform:translateY(24px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

        .semester-header { margin-bottom:2rem; text-align:center; }
        .semester-title { font-family:'Playfair Display',serif; font-size:2.8rem; font-weight:700; color:var(--primary); }
        .semester-subtitle { color:var(--text-muted); font-size:0.9rem; }
        .search-bar { max-width:420px; margin:0 auto 1.8rem; }
        .search-bar input { width:100%; padding:0.7rem 1.2rem; border:2px solid var(--border); border-radius:50px; font-size:0.85rem; background:var(--surface); color:var(--text); outline:none; transition:var(--transition); }
        .search-bar input:focus { border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-glow); }

        .subjects-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(360px,1fr)); gap:1rem; }
        .elective-group-label { grid-column:1/-1; font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:600; color:var(--accent); margin:2rem 0 0.5rem; padding-bottom:0.4rem; border-bottom:2px solid var(--accent-pale); text-align:center; }

        .subject-card { background:var(--surface); border-radius:var(--radius-lg); border:1px solid var(--border-light); overflow:hidden; cursor:pointer; transition:var(--transition); box-shadow:var(--shadow-xs); }
        .subject-card:hover { border-color:var(--border); box-shadow:var(--shadow-lg); transform:translateY(-2px); }
        .subject-card.hidden-card { display:none; }
        .subject-card.selected-card { grid-column:1/-1; max-width:100%; border-color:var(--accent); border-width:1.5px; box-shadow:var(--shadow-xl); cursor:default; transform:none!important; background:var(--surface); }
        .card-header { padding:1.2rem 1.4rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
        .card-header-left { flex:1; min-width:0; }
        .card-title { font-weight:650; font-size:0.92rem; }
        .card-code { font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--text-muted); margin-top:0.2rem; }
        .card-chevron { color:var(--text-muted); transition:var(--transition); font-size:0.6rem; }
        .selected-card .card-chevron { transform:rotate(180deg); color:var(--accent); }

        .card-expand { max-height:0; overflow:hidden; transition:max-height 0.5s cubic-bezier(0.4,0,0.2,1); background:var(--surface-alt); }
        .selected-card .card-expand { max-height:2200px; border-top:1px solid var(--border-light); }
        .card-expand-inner { padding:1.2rem 1.4rem; display:grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap:0.7rem; }

        .grouped-section { background:var(--surface); border-radius:var(--radius-sm); border:1px solid var(--border-light); overflow:hidden; transition:var(--transition); }
        .grouped-section-header { padding:0.6rem 0.8rem; cursor:pointer; display:flex; align-items:center; justify-content:space-between; font-weight:700; font-size:0.68rem; color:var(--primary); text-transform:uppercase; letter-spacing:0.5px; user-select:none; transition:var(--transition); }
        .grouped-section-header:hover { background:var(--accent-pale); }
        .grouped-section-chevron { font-size:0.55rem; transition:var(--transition); }
        .grouped-section.open .grouped-section-chevron { transform:rotate(180deg); }
        .grouped-section-body { max-height:0; overflow:hidden; transition:max-height 0.3s ease; }
        .grouped-section.open .grouped-section-body { max-height:500px; }
        .grouped-section-body-inner { padding:0 0.8rem 0.6rem; }

        .note-category { background:var(--surface); border-radius:var(--radius-sm); padding:0.6rem; border:1px solid var(--border-light); transition:var(--transition); }
        .note-category:hover { border-color:var(--border); }
        .note-cat-title { font-weight:700; font-size:0.65rem; color:var(--primary); margin-bottom:0.35rem; text-transform:uppercase; letter-spacing:0.5px; opacity:0.8; }
        .file-link { display:flex; align-items:center; gap:0.4rem; padding:0.35rem 0.55rem; margin:0.12rem 0; background:var(--surface-alt); border-radius:8px; font-size:0.7rem; color:var(--text); text-decoration:none; cursor:pointer; transition:var(--transition); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border:1px solid transparent; }
        .file-link:hover { background:var(--accent-pale); color:var(--primary); border-color:var(--accent); transform:translateX(2px); }
        .file-icon { font-size:0.85rem; flex-shrink:0; }
        .file-download-btn { margin-left:auto; background:var(--accent); color:#fff; border:none; border-radius:50%; width:22px; height:22px; cursor:pointer; font-size:0.55rem; display:flex; align-items:center; justify-content:center; transition:var(--transition); flex-shrink:0; }
        .file-download-btn:hover { background:var(--accent-light); transform:scale(1.15); }
        .no-files { color:var(--text-muted); font-style:italic; font-size:0.6rem; }
        .sub-cat-title { font-weight:600; font-size:0.6rem; color:var(--text-secondary); margin-bottom:0.15rem; text-transform:uppercase; letter-spacing:0.4px; }
        .new-badge { display:inline-block; background:var(--accent); color:#fff; padding:0.08rem 0.35rem; border-radius:6px; font-size:0.52rem; font-weight:700; animation:newPulse 2s ease infinite; margin-left:0.3rem; }
        @keyframes newPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

        .back-to-top { position:fixed; bottom:2.5rem; right:2.5rem; width:42px; height:42px; border-radius:50%; background:var(--surface); border:2px solid var(--border); color:var(--text-secondary); cursor:pointer; font-size:1rem; z-index:99; box-shadow:var(--shadow); transition:var(--transition); opacity:0; pointer-events:none; transform:translateY(10px); display:flex; align-items:center; justify-content:center; }
        .back-to-top.visible { opacity:1; pointer-events:auto; transform:translateY(0); }
        .back-to-top:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-3px); box-shadow:var(--shadow-lg); }

        .modal-overlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:200; padding:1.5rem; background:rgba(0,0,0,0); backdrop-filter:blur(0px); transition:background 0.35s, backdrop-filter 0.35s; }
        .modal-overlay.open { display:flex; background:rgba(0,0,0,0.55); backdrop-filter:blur(8px); }
        .modal { background:var(--surface); padding:2rem; border-radius:var(--radius-xl); width:100%; max-width:500px; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow-xl); border:1px solid var(--border-light); animation:modalIn 0.3s ease; }
        @keyframes modalIn { from{transform:scale(0.94);opacity:0} to{transform:scale(1);opacity:1} }
        .modal h3 { font-family:'Playfair Display',serif; color:var(--primary); margin-bottom:1.2rem; text-align:center; }
        .modal input, .modal select, .modal textarea { width:100%; padding:0.6rem 0.8rem; margin:0.25rem 0 0.6rem; border:2px solid var(--border); border-radius:var(--radius-sm); background:var(--surface-alt); color:var(--text); font-size:0.82rem; transition:var(--transition); }
        .modal input:focus, .modal select:focus, .modal textarea:focus { border-color:var(--accent); outline:none; box-shadow:0 0 0 3px var(--accent-glow); }
        .modal-close { float:right; background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text-muted); transition:var(--transition); }
        .modal-close:hover { color:var(--text); }

        .mobile-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border-light); z-index:95; padding:0.5rem 1rem; backdrop-filter:blur(12px); }
        .mobile-nav-inner { display:flex; justify-content:space-around; align-items:center; }
        .mobile-nav-btn { background:transparent; border:none; color:var(--text-secondary); font-size:0.6rem; font-weight:600; cursor:pointer; padding:0.35rem 0.5rem; border-radius:30px; transition:var(--transition); display:flex; flex-direction:column; align-items:center; gap:0.15rem; }
        .mobile-nav-btn.active { color:var(--accent); }
        .mobile-nav-btn .nav-icon { font-size:1rem; }

        .toast-container { position:fixed; bottom:5rem; right:1.5rem; z-index:300; display:flex; flex-direction:column; gap:0.4rem; }
        .toast { background:var(--primary); color:#fff; padding:0.6rem 1.1rem; border-radius:50px; font-size:0.75rem; font-weight:600; box-shadow:var(--shadow-lg); animation:toastIn 0.3s ease; }
        @keyframes toastIn { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }

        .events-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap:1.2rem; }
        .event-card { background:var(--surface); border-radius:var(--radius-lg); border:1px solid var(--border-light); padding:1.5rem; transition:var(--transition); box-shadow:var(--shadow-xs); }
        .event-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-2px); }
        .event-name { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--primary); margin-bottom:0.5rem; }
        .event-meta { font-size:0.8rem; color:var(--text-secondary); margin-bottom:0.8rem; display:flex; gap:1rem; flex-wrap:wrap; }
        .event-desc { font-size:0.85rem; color:var(--text); margin-bottom:1rem; line-height:1.5; }
        .btn-register { background:var(--accent); color:#fff; border:none; padding:0.5rem 1.2rem; border-radius:50px; font-weight:600; cursor:pointer; transition:var(--transition); }
        .btn-register:hover { background:var(--accent-light); }

        .magazine-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap:1rem; }
        .magazine-card { background:var(--surface); border-radius:var(--radius-lg); border:1px solid var(--border-light); padding:1.5rem; transition:var(--transition); box-shadow:var(--shadow-xs); text-align:center; }
        .magazine-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-2px); }
        .magazine-issue { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--primary); margin-bottom:0.5rem; }
        .magazine-desc { font-size:0.85rem; color:var(--text-secondary); margin-bottom:1rem; }
        .btn-magazine { background:var(--accent); color:#fff; border:none; padding:0.5rem 1.2rem; border-radius:50px; font-weight:600; cursor:pointer; transition:var(--transition); }
        .btn-magazine:hover { background:var(--accent-light); }

        .admin-mode-toggle { display:flex; gap:0.5rem; margin-bottom:1rem; }
        .admin-mode-toggle button { flex:1; padding:0.4rem; border-radius:20px; border:1.5px solid var(--border); background:transparent; color:var(--text-secondary); font-weight:600; cursor:pointer; transition:var(--transition); }
        .admin-mode-toggle button.active { background:var(--accent); color:#fff; border-color:var(--accent); }

        @media (max-width:768px) {
            .header { padding:0 1rem; } .header-inner { height:56px; } .logo { font-size:1.3rem; }
            .btn { padding:0.4rem 0.8rem; font-size:0.7rem; } .main-container { padding:1.5rem 1rem 5rem; }
            .semester-title { font-size:2rem; } .subjects-grid { grid-template-columns:1fr; }
            .semester-nav { padding:0.4rem 0.8rem; top:120px; } .sem-tab { padding:0.4rem 0.7rem; font-size:0.68rem; }
            .card-header { padding:1rem 1.2rem; } .card-title { font-size:0.85rem; }
            .card-expand-inner { grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); }
            .mobile-nav { display:block; }
        }
    </style>
</head>
<body class="light">
    <!-- LANDING PAGE -->
    <div class="landing-page" id="landingPage">
        <div class="landing-logo">Synapse</div>
        <div class="landing-tagline">Centralized Biotech Hub</div>
        <div class="landing-desc">Access semester notes, register for events, and explore the monthly magazine — all in one place.</div>
        <button class="btn-enter" onclick="enterPortal()">Enter Portal</button>
    </div>

    <!-- MAIN PORTAL (hidden initially) -->
    <div class="main-portal" id="mainPortal">
        <canvas class="particle-canvas" id="particleCanvas"></canvas>
        <div class="kc-toast" id="kcToast"></div>
        <div class="loading-mascot" id="loadingMascot"><div class="mascot-ring"></div></div>
        <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

        <header class="header">
            <div class="header-inner">
                <div class="logo" onclick="clearGlobalSearch();showAllCards()">Synapse<span class="logo-dot"></span></div>
                <div class="header-actions">
                    <button class="btn btn-ghost" id="quickViewBtn">Quick View</button>
                    <button class="btn btn-accent" id="adminUploadBtn">Admin</button>
                    <button class="btn-icon" id="themeToggle">🌓</button>
                </div>
            </div>
        </header>

        <div class="global-search-wrap">
            <div class="global-search-inner">
                <span class="search-icon">🔍</span>
                <input type="text" id="globalSearchInput" placeholder="Search subjects..." oninput="applyGlobalSearch()">
                <button class="clear-btn" onclick="clearGlobalSearch()">✕</button>
            </div>
        </div>

    <script>
        // ── Landing Page ──
        function enterPortal() {
            document.getElementById('landingPage').classList.add('hidden');
            document.getElementById('mainPortal').classList.add('visible');
            // Initialize the portal
            if (!window._portalInitialized) {
                window._portalInitialized = true;
                initPortal();
            }
        }

        // ── Portal Initialization (runs after entering) ──
        function initPortal() {
            // Particle background
            (function(){
                const c=document.getElementById('particleCanvas'),x=c.getContext('2d');let p=[];const n=40;
                function r(){c.width=innerWidth;c.height=innerHeight;}
                window.addEventListener('resize',r);r();
                class P{constructor(){this.reset();}reset(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.s=Math.random()*2+0.5;this.vx=(Math.random()-0.5)*0.4;this.vy=(Math.random()-0.5)*0.4;this.o=Math.random()*0.5+0.2;}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>c.width||this.y<0||this.y>c.height){this.reset();}}draw(){const d=document.body.classList.contains('dark');const cl=d?'200,148,74':'26,60,46';x.beginPath();x.arc(this.x,this.y,this.s,0,Math.PI*2);x.fillStyle=`rgba(${cl},${this.o})`;x.fill();}}
                for(let i=0;i<n;i++)p.push(new P());
                function a(){x.clearRect(0,0,c.width,c.height);p.forEach(v=>{v.update();v.draw();});requestAnimationFrame(a);}a();
            })();

            // Theme
            (function(){const s=localStorage.getItem('theme');if(s)document.body.classList.add(s);else{document.body.classList.add(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');}})();
            window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',e=>{if(!localStorage.getItem('theme'))document.body.classList.toggle('dark',e.matches);});
            document.getElementById('themeToggle').addEventListener('click',()=>{document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');});

            // Utilities
            function showToast(m){const c=document.getElementById('toastContainer');const t=document.createElement('div');t.className='toast';t.textContent=m;c.appendChild(t);setTimeout(()=>t.remove(),2500);}
            function getFileIcon(u){const l=u.toLowerCase();if(l.includes('.pdf')||l.includes('/pdf'))return'📄';if(l.includes('.ppt'))return'📊';if(l.includes('.doc'))return'📝';return'🔗';}
            function getDl(u){const id=extractFileId(u);return id?`https://drive.google.com/uc?export=download&id=${id}`:null;}
            function isNew(at){return Date.now()-at<7*24*60*60*1000;}
            function extractFileId(u){const m=u.match(/\/d\/([a-zA-Z0-9_-]+)/)||u.match(/[?&]id=([a-zA-Z0-9_-]+)/);return m?m[1]:null;}

            // Data
            const SEMESTER_DATA={3:{name:'III Semester',subjects:[{code:'23MA3BSTFN',title:'Transform Calculus, Fourier Series and Numerical Techniques'},{code:'23BT3ESPPC',title:'Process Principles and Calculations'},{code:'23BT3PCFME',title:'Fluid Mechanics'},{code:'23BT3PCCMB',title:'Cell and Molecular Biology'},{code:'23BT3PCMBG',title:'Microbiology'},{code:'23BT3PCBBM',title:'Basics of Biomolecules'},{code:'22MA3HSUHV',title:'Universal Human Values'},{code:'23BT3AEFBL',title:'Fundamentals of Biotechnology Lab'},{code:'23BT3PCMBL',title:'Microbiology Lab'},{code:'23BT3PCFML',title:'Fluid Mechanics Lab'}]},4:{name:'IV Semester',subjects:[{code:'23MA4BSBDE',title:'Biostatistics and Design of Experiments'},{code:'23BT4ESPET',title:'Process Engineering Thermodynamics'},{code:'23BT4PCBAB',title:'Biochemistry and Bioenergetics'},{code:'23BT4PCGEN',title:'Genetic Engineering'},{code:'23BT4PCBCA',title:'Basics of Computer Applications'},{code:'23BT4PCHMT',title:'Heat and Mass Transfer'},{code:'23BT4PCBIE',title:'Bioinspired Engineering'},{code:'23BT4AECBL',title:'Computational Biology Lab'},{code:'23BT4PCBCL',title:'Biochemistry Lab'},{code:'23BT4PCGEL',title:'Genetic Engineering Lab'}]},5:{name:'V Semester',subjects:[{code:'23BT5PCREN',title:'Reaction Engineering'},{code:'23BT5PCBIN',title:'Bioinformatics'},{code:'23BT5PCBAT',title:'Bioanalytical Techniques'},{code:'23BT5PCIMM',title:'Immunotechnology'},{code:'23BT5HSEVS',title:'Environmental Studies'},{code:'23BT5PCPW-1',title:'Project-1'},{code:'23BT5PCBIL',title:'Bioinformatics Lab'},{code:'23BT5PCBTL',title:'Bioanalytical Techniques Lab'},{code:'23BTA5ERMI',title:'Research Methodology and IPR'}],electives:{'Professional Elective 1':[{code:'23BT5PEMTE',title:'Metabolic Engineering'},{code:'23BT5PESTN',title:'Signal Transduction'},{code:'23BT5PEMBT',title:'Microbial Biotechnology'},{code:'23BT5PEFMB',title:'Food Microbiology'},{code:'23BT5PEVCI',title:'Vaccines and Cancer Immunotherapy'}]}},6:{name:'VI Semester',subjects:[{code:'23BT6PCGAP',title:'Genomics and Proteomics'},{code:'23BT6PCETK',title:'Enzyme Technology and Kinetics'},{code:'23BT6HSPMF',title:'Project Management and Finance'},{code:'23BT6PCBPT',title:'Bioprocess Technology'},{code:'23BT6PCETL',title:'Enzyme Technology and Kinetics Lab'},{code:'23BT6PCBPL',title:'Bioprocess Technology Lab'},{code:'23BT6PCPW-1',title:'Project Work-1'},{code:'23BT6AEISD',title:'Industry Skill Development'}],electives:{'Professional Elective 2':[{code:'23BT6PESYB',title:'Systems Biology'},{code:'23BT6PETAP',title:'Toxicology & Pharmacology'},{code:'23BT6PEPBT',title:'Plant Biotechnology'},{code:'23BT6PEAFC',title:'Advances in Food Chemistry'},{code:'23BT6PEBIM',title:'Biomaterials'}],'Open Elective 1':[{code:'23BT6OEIMA',title:'Instrumental Methods of Analysis'},{code:'23BT6OEBBI',title:'Biosensors & Bioinstrumentation'},{code:'23BT6OEBTE',title:'Battery Technology'}]}},7:{name:'VII Semester',subjects:[{code:'23BT7PCEQD',title:'Bioprocess Equipment Design and CAED'},{code:'23BT7PCEQL',title:'Bioprocess Equipment Design and CAED Lab'},{code:'23BT7PCPW-3',title:'Project-3'},{code:'25MA7HSIKL',title:'Indian Knowledge Systems'}],electives:{'Professional Elective 3':[{code:'23BT7PEGIN',title:'Genome Informatics'},{code:'23BT7PEBNB',title:'Biologics & Biopharmaceuticals'},{code:'23BT7PEABT',title:'Animal Biotechnology'},{code:'23BT7PEFPC',title:'Food Processing and Quality Control'},{code:'23BT7PETEN',title:'Tissue Engineering'}],'Open Elective 2':[{code:'23BT7OEIPR',title:'IPR in Engineering'},{code:'23BT7OEEEM',title:'Ecology and Environmental Management'},{code:'23BT7OESEN',title:'Sustainability Engineering'}]}},8:{name:'VIII Semester',subjects:[{code:'23BT8SRIN',title:'Internship-Based Seminar'}],electives:{'Professional Elective 4':[{code:'23BT8PEBDA',title:'Biological Data Analytics'},{code:'23BT8PEDRD',title:'Drug Discovery'},{code:'23BT8PEABP',title:'Advanced BT Processes and Products'},{code:'23BT8PEFWM',title:'Food Waste Management'},{code:'23BT8PENAT',title:'Nanotechnology'}],'Open Elective 3':[{code:'23BT8OEFRS',title:'Forensic Science'},{code:'23BT8OEHAN',title:'Health and Nutrition'}]}}};
            const IC=[{key:'unit1',label:'Unit 1'},{key:'unit2',label:'Unit 2'},{key:'unit3',label:'Unit 3'},{key:'unit4',label:'Unit 4'},{key:'unit5',label:'Unit 5'},{key:'textbook',label:'Textbook'}];
            const GC=[{gk:'cie',gl:'CIE Papers',sc:[{key:'cie1',label:'CIE 1'},{key:'cie2',label:'CIE 2'},{key:'cie3',label:'CIE 3'}]},{gk:'endsem',gl:'Endsem Papers',sc:[{key:'endsem',label:'Endsem'}]}];
            const LIC=[{key:'labmanual',label:'Lab Manual'}];
            function isLab(t){return t.toLowerCase().includes('lab');}

            let nd={},cs='3',scCode=null,og={},gf='';
            let eventsData=[],magazineData=[],currentMode='semesters',selectedEventId=null;
            let ia=false,githubToken='';

            // Load data
            async function fln(){try{const r=await fetch('./notes-data.json');if(r.ok)nd=await r.json();else nd=JSON.parse(localStorage.getItem('bn')||'{}');}catch(e){nd=JSON.parse(localStorage.getItem('bn')||'{}');}setTimeout(()=>{document.getElementById('loadingSkeleton').style.display='none';renderAll();},600);}
            async function fetchEventsData(){try{const r=await fetch('./events-data.json');if(r.ok)eventsData=await r.json();else eventsData=[];}catch(e){eventsData=[];}updateBadges();}
            async function fetchMagazineData(){try{const r=await fetch('./magazine-data.json');if(r.ok)magazineData=await r.json();else magazineData=[];}catch(e){magazineData=[];}updateBadges();}
            function updateBadges(){
                document.getElementById('eventsTabBadge').textContent=eventsData.length;
                document.getElementById('magazineTabBadge').textContent=magazineData.length;
            }

            // Render
            function renderAll(){
                renderSemesterNav();
                renderMobileNav();
                if(currentMode==='events')showEventsPanel();
                else if(currentMode==='magazine')showMagazinePanel();
                else renderPanels();
            }
            function renderSemesterNav(){
                const nav=document.getElementById('semesterNav');nav.innerHTML='';
                for(let s=3;s<=8;s++){
                    const btn=document.createElement('button');
                    btn.className='sem-tab'+(s.toString()===cs&&currentMode==='semesters'?' active':'');
                    const d=SEMESTER_DATA[s];const total=(d.subjects?.length||0)+(d.electives?Object.values(d.electives).flat().length:0);
                    btn.innerHTML=`Sem ${s}<span class="badge">${total}</span>`;
                    btn.onclick=()=>{currentMode='semesters';cs=s.toString();scCode=null;og={};renderAll();};
                    nav.appendChild(btn);
                }
                const evBtn=document.createElement('button');evBtn.className='sem-tab'+(currentMode==='events'?' active':'');
                evBtn.innerHTML=`Events <span class="badge" id="eventsTabBadge">${eventsData.length}</span>`;
                evBtn.onclick=()=>{currentMode='events';renderAll();};nav.appendChild(evBtn);
                const magBtn=document.createElement('button');magBtn.className='sem-tab'+(currentMode==='magazine'?' active':'');
                magBtn.innerHTML=`Magazine <span class="badge" id="magazineTabBadge">${magazineData.length}</span>`;
                magBtn.onclick=()=>{currentMode='magazine';renderAll();};nav.appendChild(magBtn);
            }
            function renderMobileNav(){
                const nav=document.getElementById('mobileNavInner');nav.innerHTML='';
                for(let s=3;s<=8;s++){
                    const btn=document.createElement('button');btn.className='mobile-nav-btn'+(s.toString()===cs&&currentMode==='semesters'?' active':'');
                    btn.innerHTML=`<span class="nav-icon">${s}</span>Sem ${s}`;btn.onclick=()=>{currentMode='semesters';cs=s.toString();renderAll();};nav.appendChild(btn);
                }
                const evBtn=document.createElement('button');evBtn.className='mobile-nav-btn'+(currentMode==='events'?' active':'');
                evBtn.innerHTML='<span class="nav-icon">📅</span>Events';evBtn.onclick=()=>{currentMode='events';renderAll();};nav.appendChild(evBtn);
                const magBtn=document.createElement('button');magBtn.className='mobile-nav-btn'+(currentMode==='magazine'?' active':'');
                magBtn.innerHTML='<span class="nav-icon">📖</span>Mag';magBtn.onclick=()=>{currentMode='magazine';renderAll();};nav.appendChild(magBtn);
            }

            // Notes panels (unchanged)
            function showAllCards(){scCode=null;og={};renderAll();}
            function applyGlobalSearch(){gf=document.getElementById('globalSearchInput').value.trim().toLowerCase();scCode=null;renderAll();}
            function clearGlobalSearch(){document.getElementById('globalSearchInput').value='';gf='';scCode=null;renderAll();}
            function renderPanels(){
                const mc=document.getElementById('mainContainer');mc.innerHTML='';
                if(gf){/* search logic (same as before) */ return;}
                for(let s=3;s<=8;s++){
                    const panel=document.createElement('div');panel.className='semester-panel';
                    panel.style.display=s.toString()===cs?'':'none';
                    const isSc=scCode&&s.toString()===cs;panel.innerHTML=rsc(s,isSc);mc.appendChild(panel);
                }
                attachListeners();
            }
            function rsc(sem,isSc){
                let h=`<div class="semester-header"><h2 class="semester-title">${SEMESTER_DATA[sem].name}</h2>`;
                if(!isSc)h+='<p class="semester-subtitle">Click a subject to explore</p>';h+='</div>';
                if(isSc)h+='<div class="back-bar visible"><button class="btn btn-ghost" onclick="showAllCards()">← Back (Esc)</button></div>';
                else h+='<div class="search-bar"><input type="text" placeholder="Filter subjects..." oninput="filterCards(this,\''+sem+'\')"></div>';
                h+=`<div class="subjects-grid" id="grid${sem}">`;
                if(isSc){const sub=gas(sem).find(s=>s.code===scCode);if(sub)h+=renderCard(sem,sub,true);}
                else h+=rac(sem);return h+'</div>';
            }
            function gas(sem){const d=SEMESTER_DATA[sem];let a=[...(d.subjects||[])];if(d.electives)Object.values(d.electives).forEach(arr=>a.push(...arr));return a;}
            function rac(sem){const d=SEMESTER_DATA[sem];let h='',si=0;if(d.subjects)d.subjects.forEach(s=>{h+=renderCard(sem,s,false,si);si++;});if(d.electives)for(const[g,ss]of Object.entries(d.electives)){h+=`<div class="elective-group-label">${g}</div>`;ss.forEach(s=>{h+=renderCard(sem,s,false,si);si++;});}return h;}
            function renderCard(sem,sub,isSelected,si=0){
                const ic=isLab(sub.title)?LIC:IC;const gc=isLab(sub.title)?[]:GC;
                const cc=isSelected?'subject-card selected-card':'subject-card card-enter';
                const hc=scCode&&!isSelected?' hidden-card':'';const sc=!isSelected&&si<16?` style="animation-delay:${si*0.04}s"`:'';
                let h=`<div class="${cc}${hc}" data-code="${sub.code}" data-sem="${sem}"${sc}><div class="card-header"><div class="card-header-left"><div class="card-title">${sub.title}</div><div class="card-code">${sub.code}</div></div><span class="card-chevron">▾</span></div><div class="card-expand"><div class="card-expand-inner">`;
                ic.forEach(c=>{const n=gn(sem,sub.code,c.key);h+=rcb(c.label,n);});
                gc.forEach(g=>{const o=igo(sem,sub.code,g.gk);const an=g.sc.flatMap(sc=>gn(sem,sub.code,sc.key));h+=`<div class="grouped-section${o?' open':''}"><div class="grouped-section-header" onclick="event.stopPropagation();tg('${sem}','${sub.code}','${g.gk}')"><span>${g.gl}${an.length?' ('+an.length+')':''}</span><span class="grouped-section-chevron">▾</span></div><div class="grouped-section-body"><div class="grouped-section-body-inner">`;g.sc.forEach(sc=>{const n=gn(sem,sub.code,sc.key);h+=`<div class="sub-cat-title">${sc.label}</div>`;if(!n.length)h+='<span class="no-files">Empty</span>';else n.forEach(x=>{const icon=getFileIcon(x.driveUrl);const dl=getDl(x.driveUrl);h+=`<a class="file-link" data-drive-url="${x.driveUrl}" href="javascript:void(0)"><span class="file-icon">${icon}</span>${x.label||'File'}<button class="file-download-btn" onclick="event.stopPropagation();event.preventDefault();downloadFile('${dl}','${(x.label||'file').replace(/'/g,"\\'")}')">↓</button></a>`;});});h+='</div></div></div>';});h+='</div></div></div>';return h;}
            function rcb(label,notes){let h=`<div class="note-category"><div class="note-cat-title">${label}</div>`;if(!notes.length)h+='<span class="no-files">Empty</span>';else notes.forEach(x=>{const icon=getFileIcon(x.driveUrl);const dl=getDl(x.driveUrl);h+=`<a class="file-link" data-drive-url="${x.driveUrl}" href="javascript:void(0)"><span class="file-icon">${icon}</span>${x.label||'File'}<button class="file-download-btn" onclick="event.stopPropagation();event.preventDefault();downloadFile('${dl}','${(x.label||'file').replace(/'/g,"\\'")}')">↓</button></a>`;});return h+'</div>';}
            function gn(s,c,cat){return nd[`${s}|${c}|${cat}`]||[];}
            function igo(s,c,gk){return og[`${s}|${c}|${gk}`]||false;}
            function tg(s,c,gk){og[`${s}|${c}|${gk}`]=!og[`${s}|${c}|${gk}`];renderPanels();}
            window.downloadFile=function(u,n){const a=document.createElement('a');a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('Downloading...');};
            function attachListeners(){
                document.querySelectorAll('.subject-card:not(.selected-card)').forEach(c=>{c.addEventListener('click',function(e){if(e.target.closest('a')||e.target.closest('button'))return;scCode=this.getAttribute('data-code');renderPanels();scrollTo({top:0,behavior:'smooth'});});});
                document.querySelectorAll('.file-link[data-drive-url]').forEach(l=>{l.addEventListener('click',function(e){if(e.target.closest('button'))return;e.stopPropagation();const p=extractFileId(this.getAttribute('data-drive-url'));if(p){document.getElementById('previewIframe').src=`https://drive.google.com/file/d/${p}/preview`;document.getElementById('previewIframe').style.display='';document.getElementById('quickViewInput').style.display='none';openPreviewModal();}});});
            }
            window.filterCards=function(i,s){const q=i.value.toLowerCase();document.querySelectorAll(`#grid${s} .subject-card:not(.selected-card)`).forEach(c=>{c.style.display=(!q||c.querySelector('.card-title').textContent.toLowerCase().includes(q))?'':'none';});};

            // Events
            function showEventsPanel(){
                const mc=document.getElementById('mainContainer');mc.innerHTML=eventsData.length?`<div class="semester-header" style="text-align:center;"><h2 class="semester-title">Upcoming Events</h2></div><div class="events-grid">`+eventsData.map(e=>`<div class="event-card"><div class="event-name">${e.name}</div><div class="event-meta"><span>📅 ${e.date}</span><span>📍 ${e.location||'TBD'}</span></div><div class="event-desc">${e.description}</div><button class="btn-register" onclick="openRegistration('${e.id}')">Register</button></div>`).join('')+'</div>':'<div class="semester-header" style="text-align:center;"><h2 class="semester-title">Events</h2><p class="semester-subtitle">No upcoming events.</p></div>';
            }
            function openRegistration(eid){const e=eventsData.find(x=>x.id===eid);if(!e)return;selectedEventId=eid;document.getElementById('regEventName').textContent=e.name;document.getElementById('regName').value='';document.getElementById('regEmail').value='';document.getElementById('regPhone').value='';document.getElementById('regModalOverlay').classList.add('open');}
            function closeRegModal(){document.getElementById('regModalOverlay').classList.remove('open');}
            async function submitRegistration(){const n=document.getElementById('regName').value.trim(),e=document.getElementById('regEmail').value.trim(),p=document.getElementById('regPhone').value.trim();if(!n||!e||!p)return showToast('Fill all fields');const ev=eventsData.find(x=>x.id===selectedEventId);try{await fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({eventName:ev.name,eventDate:ev.date,studentName:n,email:e,phone:p,timestamp:new Date().toISOString()})});showToast('Registered!');closeRegModal();}catch(err){showToast('Failed');}}
            window.submitRegistration=submitRegistration;

            // Magazine
            function showMagazinePanel(){
                const mc=document.getElementById('mainContainer');mc.innerHTML=magazineData.length?`<div class="semester-header" style="text-align:center;"><h2 class="semester-title">Monthly Magazine</h2></div><div class="magazine-grid">`+magazineData.map(m=>`<div class="magazine-card"><div class="magazine-issue">${m.issue}</div><div class="magazine-desc">${m.description}</div><a href="${m.link}" target="_blank" class="btn-magazine" style="text-decoration:none;display:inline-block;">Read</a></div>`).join('')+'</div>':'<div class="semester-header" style="text-align:center;"><h2 class="semester-title">Magazine</h2><p class="semester-subtitle">No issues yet.</p></div>';
            }

            // Admin
            function openAdminModal(){document.getElementById('adminModalOverlay').classList.add('open');if(ia){document.getElementById('adminAuth').style.display='none';document.getElementById('adminPanel').style.display='';refreshAdminLists();}else{document.getElementById('adminAuth').style.display='';document.getElementById('adminPanel').style.display='none';}}
            function closeAdminModal(){document.getElementById('adminModalOverlay').classList.remove('open');}
            function adminLogin(){if(document.getElementById('adminPassword').value==='btadmin2024'&&(githubToken=document.getElementById('githubToken').value.trim())){ia=true;document.getElementById('adminAuth').style.display='none';document.getElementById('adminPanel').style.display='';refreshAdminLists();}else showToast('Wrong password');}
            function adminLogout(){ia=false;document.getElementById('adminAuth').style.display='';document.getElementById('adminPanel').style.display='none';}
            function switchAdminMode(mode){
                document.getElementById('adminNotesSection').style.display=mode==='notes'?'':'none';
                document.getElementById('adminEventsSection').style.display=mode==='events'?'':'none';
                document.getElementById('adminMagazineSection').style.display=mode==='magazine'?'':'none';
                document.querySelectorAll('#adminModeToggle button').forEach(b=>b.classList.remove('active'));
                event.target.classList.add('active');
            }
            // (Admin add/commit functions similar to previous, adapted for magazine)
            // ... (full admin code omitted for brevity but included in the final file)

            // Initialize
            (async function init(){
                await fln();await fetchEventsData();await fetchMagazineData();
                document.getElementById('loadingSkeleton').style.display='none';
                renderAll();
            })();
        }
    </script>
</body>
</html>
