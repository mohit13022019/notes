    <script>
        (function() {
            const canvas = document.getElementById('particleCanvas'); const ctx = canvas.getContext('2d'); let particles = []; const maxParticles = 50;
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize); resize();
            class Particle { constructor() { this.reset(); } reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 3 + 1; this.speedX = (Math.random() - 0.5) * 0.5; this.speedY = (Math.random() - 0.5) * 0.5; this.opacity = Math.random() * 0.6 + 0.2; } update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) { this.reset(); this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; } } draw() { const isDark = document.body.classList.contains('dark'); const color = isDark ? '200, 148, 74' : '26, 60, 46'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(${color}, ${this.opacity})`; ctx.fill(); } }
            for (let i = 0; i < maxParticles; i++) particles.push(new Particle());
            function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); } animate();
        })();

        (function() { const saved = localStorage.getItem('theme'); if (saved) document.body.classList.add(saved); else { document.body.classList.add(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); } })();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => { if (!localStorage.getItem('theme')) document.body.classList.toggle('dark', e.matches); });

        document.addEventListener('mousemove', function(e) { if (Math.random() > 0.7) return; const s = document.createElement('div'); s.className = 'sparkle'; s.style.left = e.clientX + 'px'; s.style.top = e.clientY + 'px'; s.style.setProperty('--sx', (Math.random() - 0.5) * 30 + 'px'); s.style.setProperty('--sy', (Math.random() - 0.5) * 30 + 'px'); document.getElementById('sparkleContainer').appendChild(s); setTimeout(() => s.remove(), 600); }, { passive: true });

        window.toggleReadingMode = function() { document.body.classList.toggle('reading-mode'); showToast(document.body.classList.contains('reading-mode') ? 'Reading mode on' : 'Reading mode off'); };

        function getFileIcon(url) { const u = url.toLowerCase(); if (u.includes('.pdf')||u.includes('/pdf')) return '📄'; if (u.includes('.ppt')||u.includes('.pptx')||u.includes('presentation')) return '📊'; if (u.includes('.doc')||u.includes('.docx')||u.includes('document')) return '📝'; if (u.includes('.xls')||u.includes('.xlsx')||u.includes('spreadsheet')) return '📈'; if (u.includes('.zip')||u.includes('.rar')) return '📦'; return '🔗'; }
        function getDirectDownloadUrl(driveUrl) { const id = extractFileId(driveUrl); return id ? `https://drive.google.com/uc?export=download&id=${id}` : null; }

        const SEMESTER_DATA = {
            3:{name:'III Semester',subjects:[{code:'23MA3BSTFN',title:'Transform Calculus, Fourier Series and Numerical Techniques'},{code:'23BT3ESPPC',title:'Process Principles and Calculations'},{code:'23BT3PCFME',title:'Fluid Mechanics'},{code:'23BT3PCCMB',title:'Cell and Molecular Biology'},{code:'23BT3PCMBG',title:'Microbiology'},{code:'23BT3PCBBM',title:'Basics of Biomolecules'},{code:'22MA3HSUHV',title:'Universal Human Values'},{code:'23BT3AEFBL',title:'Fundamentals of Biotechnology Lab'},{code:'23BT3PCMBL',title:'Microbiology Lab'},{code:'23BT3PCFML',title:'Fluid Mechanics Lab'}]},
            4:{name:'IV Semester',subjects:[{code:'23MA4BSBDE',title:'Biostatistics and Design of Experiments'},{code:'23BT4ESPET',title:'Process Engineering Thermodynamics'},{code:'23BT4PCBAB',title:'Biochemistry and Bioenergetics'},{code:'23BT4PCGEN',title:'Genetic Engineering'},{code:'23BT4PCBCA',title:'Basics of Computer Applications'},{code:'23BT4PCHMT',title:'Heat and Mass Transfer'},{code:'23BT4PCBIE',title:'Bioinspired Engineering'},{code:'23BT4AECBL',title:'Computational Biology Lab'},{code:'23BT4PCBCL',title:'Biochemistry Lab'},{code:'23BT4PCGEL',title:'Genetic Engineering Lab'}]},
            5:{name:'V Semester',subjects:[{code:'23BT5PCREN',title:'Reaction Engineering'},{code:'23BT5PCBIN',title:'Bioinformatics'},{code:'23BT5PCBAT',title:'Bioanalytical Techniques'},{code:'23BT5PCIMM',title:'Immunotechnology'},{code:'23BT5HSEVS',title:'Environmental Studies'},{code:'23BT5PCPW-1',title:'Project-1'},{code:'23BT5PCBIL',title:'Bioinformatics Lab'},{code:'23BT5PCBTL',title:'Bioanalytical Techniques Lab'},{code:'23BTA5ERMI',title:'Research Methodology and IPR'}],electives:{'Professional Elective 1':[{code:'23BT5PEMTE',title:'Metabolic Engineering'},{code:'23BT5PESTN',title:'Signal Transduction'},{code:'23BT5PEMBT',title:'Microbial Biotechnology'},{code:'23BT5PEFMB',title:'Food Microbiology'},{code:'23BT5PEVCI',title:'Vaccines and Cancer Immunotherapy'}]}},
            6:{name:'VI Semester',subjects:[{code:'23BT6PCGAP',title:'Genomics and Proteomics'},{code:'23BT6PCETK',title:'Enzyme Technology and Kinetics'},{code:'23BT6HSPMF',title:'Project Management and Finance'},{code:'23BT6PCBPT',title:'Bioprocess Technology'},{code:'23BT6PCETL',title:'Enzyme Technology and Kinetics Lab'},{code:'23BT6PCBPL',title:'Bioprocess Technology Lab'},{code:'23BT6PCPW-1',title:'Project Work-1'},{code:'23BT6AEISD',title:'Industry Skill Development'}],electives:{'Professional Elective 2':[{code:'23BT6PESYB',title:'Systems Biology'},{code:'23BT6PETAP',title:'Toxicology & Pharmacology'},{code:'23BT6PEPBT',title:'Plant Biotechnology'},{code:'23BT6PEAFC',title:'Advances in Food Chemistry'},{code:'23BT6PEBIM',title:'Biomaterials'}],'Open Elective 1':[{code:'23BT6OEIMA',title:'Instrumental Methods of Analysis'},{code:'23BT6OEBBI',title:'Biosensors & Bioinstrumentation'},{code:'23BT6OEBTE',title:'Battery Technology'}]}},
            7:{name:'VII Semester',subjects:[{code:'23BT7PCEQD',title:'Bioprocess Equipment Design and CAED'},{code:'23BT7PCEQL',title:'Bioprocess Equipment Design and CAED Lab'},{code:'23BT7PCPW-3',title:'Project-3'},{code:'25MA7HSIKL',title:'Indian Knowledge Systems'}],electives:{'Professional Elective 3':[{code:'23BT7PEGIN',title:'Genome Informatics'},{code:'23BT7PEBNB',title:'Biologics & Biopharmaceuticals'},{code:'23BT7PEABT',title:'Animal Biotechnology'},{code:'23BT7PEFPC',title:'Food Processing and Quality Control'},{code:'23BT7PETEN',title:'Tissue Engineering'}],'Open Elective 2':[{code:'23BT7OEIPR',title:'IPR in Engineering'},{code:'23BT7OEEEM',title:'Ecology and Environmental Management'},{code:'23BT7OESEN',title:'Sustainability Engineering'}]}},
            8:{name:'VIII Semester',subjects:[{code:'23BT8SRIN',title:'Internship-Based Seminar'}],electives:{'Professional Elective 4':[{code:'23BT8PEBDA',title:'Biological Data Analytics'},{code:'23BT8PEDRD',title:'Drug Discovery'},{code:'23BT8PEABP',title:'Advanced BT Processes and Products'},{code:'23BT8PEFWM',title:'Food Waste Management'},{code:'23BT8PENAT',title:'Nanotechnology'}],'Open Elective 3':[{code:'23BT8OEFRS',title:'Forensic Science'},{code:'23BT8OEHAN',title:'Health and Nutrition'}]}}
        };

        const INDIVIDUAL_CATEGORIES = [
            {key:'unit1',label:'Unit 1'},{key:'unit2',label:'Unit 2'},{key:'unit3',label:'Unit 3'},
            {key:'unit4',label:'Unit 4'},{key:'unit5',label:'Unit 5'},{key:'textbook',label:'Textbook'}
        ];
        const GROUPED_CATEGORIES = [
            {groupKey:'cie',groupLabel:'CIE Papers',subCategories:[{key:'cie1',label:'CIE 1'},{key:'cie2',label:'CIE 2'},{key:'cie3',label:'CIE 3'}]},
            {groupKey:'endsem',groupLabel:'Endsem Papers',subCategories:[{key:'endsem',label:'Endsem'}]}
        ];
        const LAB_INDIVIDUAL = [{key:'labmanual',label:'Lab Manual'}];
        function isLabSubject(title) { return title.toLowerCase().includes('lab'); }

        let notesData = {}, currentSemester = '3', selectedCardCode = null, isAdmin = false, githubToken = '', openGroups = {};
        let globalFilter = '';

        function updateBackToTop() { document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 500); }
        window.addEventListener('scroll', updateBackToTop, {passive: true});

        async function fetchLiveNotes() { try { const res = await fetch('./notes-data.json'); if (res.ok) notesData = await res.json(); else notesData = JSON.parse(localStorage.getItem('bt_notes')||'{}'); } catch(e) { notesData = JSON.parse(localStorage.getItem('bt_notes')||'{}'); } setTimeout(() => { const skel = document.getElementById('loadingSkeleton'); if (skel) skel.style.display = 'none'; renderAll(); }, 800); }
        function saveLocal() { localStorage.setItem('bt_notes', JSON.stringify(notesData)); }
        function getNotesKey(sem,code,cat) { return `${sem}|${code}|${cat}`; }
        function getNotes(sem,code,cat) { return notesData[getNotesKey(sem,code,cat)] || []; }
        function extractFileId(url) { const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/); return m ? m[1] : null; }
        function extractFolderId(url) { const m = url.match(/\/folders\/([a-zA-Z0-9_-]+)/); return m ? m[1] : null; }
        function showToast(msg) { const c=document.getElementById('toastContainer'); const t=document.createElement('div'); t.className='toast'; t.textContent=msg; c.appendChild(t); setTimeout(()=>t.remove(),2500); }
        function showKcToast(msg) { const el=document.getElementById('kcToast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),800); }
        function showAllCards() { selectedCardCode = null; openGroups = {}; renderAll(); }

        function animateValue(el, start, end, duration) {
            if (start === end) { el.textContent = end; return; }
            const range = end - start;
            const increment = range / (duration / 16);
            let current = start;
            const timer = setInterval(() => {
                current += increment;
                if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
                    el.textContent = end;
                    clearInterval(timer);
                } else {
                    el.textContent = Math.round(current);
                }
            }, 16);
        }

        function renderAll() { renderTabs(); renderMobileNav(); renderPanels(); }
        function renderTabs() {
            const nav = document.getElementById('semesterNav'); nav.innerHTML = '';
            for(let s=3; s<=8; s++) {
                const btn = document.createElement('button');
                btn.className = 'sem-tab' + (s.toString()===currentSemester && !globalFilter ? ' active' : '');
                const d = SEMESTER_DATA[s];
                const total = (d.subjects?.length||0) + (d.electives ? Object.values(d.electives).flat().length : 0);
                btn.innerHTML = `Sem ${s} <span class="badge" data-target="${total}">0</span>`;
                btn.onclick = () => {
                    clearGlobalSearch();
                    currentSemester = s.toString();
                    selectedCardCode = null;
                    openGroups = {};
                    renderAll();
                };
                nav.appendChild(btn);
                const badge = btn.querySelector('.badge');
                animateValue(badge, 0, total, 600);
            }
        }
        function renderMobileNav() {
            const nav = document.getElementById('mobileNavInner'); nav.innerHTML = '';
            for(let s=3; s<=8; s++) {
                const btn = document.createElement('button');
                btn.className = 'mobile-nav-btn' + (s.toString()===currentSemester && !globalFilter ? ' active' : '');
                btn.innerHTML = `<span class="nav-icon">${s}</span>Sem ${s}`;
                btn.onclick = () => { clearGlobalSearch(); currentSemester = s.toString(); selectedCardCode = null; renderAll(); };
                nav.appendChild(btn);
            }
        }

        function applyGlobalSearch() {
            globalFilter = document.getElementById('globalSearchInput').value.trim().toLowerCase();
            selectedCardCode = null;
            renderAll();
        }
        function clearGlobalSearch() {
            document.getElementById('globalSearchInput').value = '';
            globalFilter = '';
            selectedCardCode = null;
            renderAll();
        }
        window.clearGlobalSearch = clearGlobalSearch;

        function getGroupOpenKey(sem, code, groupKey) { return `${sem}|${code}|${groupKey}`; }
        function isGroupOpen(sem, code, groupKey) { return openGroups[getGroupOpenKey(sem, code, groupKey)] || false; }
        function toggleGroup(sem, code, groupKey) { const key = getGroupOpenKey(sem, code, groupKey); openGroups[key] = !openGroups[key]; renderPanels(); }

        function getAllSubjectsFlat() {
            const all = [];
            for (let sem = 3; sem <= 8; sem++) {
                const data = SEMESTER_DATA[sem];
                const subs = [...(data.subjects||[])];
                if (data.electives) Object.values(data.electives).forEach(arr => subs.push(...arr));
                subs.forEach(s => all.push({ ...s, semester: sem, semesterName: data.name }));
            }
            return all;
        }

        function renderPanels() {
            const mc = document.getElementById('mainContainer');
            const skel = document.getElementById('loadingSkeleton');
            if (skel) skel.style.display = 'none';
            mc.innerHTML = '';

            if (globalFilter) {
                const allSubjects = getAllSubjectsFlat();
                const filtered = allSubjects.filter(s => s.title.toLowerCase().includes(globalFilter) || s.code.toLowerCase().includes(globalFilter));
                if (filtered.length === 0) {
                    mc.innerHTML = `<div class="semester-panel"><div class="semester-header"><h2 class="semester-title">Search Results</h2><p class="semester-subtitle">No subjects match "${globalFilter}"</p></div></div>`;
                    return;
                }
                const grouped = {};
                filtered.forEach(s => { if (!grouped[s.semester]) grouped[s.semester] = { name: s.semesterName, subjects: [] }; grouped[s.semester].subjects.push(s); });
                let html = '<div class="semester-panel"><div class="semester-header"><h2 class="semester-title">Search Results</h2><p class="semester-subtitle">Found across all semesters</p></div>';
                for (const sem of Object.keys(grouped).sort()) {
                    html += `<div class="elective-group-label">${grouped[sem].name}</div>`;
                    html += '<div class="subjects-grid">';
                    grouped[sem].subjects.forEach((s, i) => { html += renderCard(s.semester, {code: s.code, title: s.title}, false, i); });
                    html += '</div>';
                }
                mc.innerHTML = html + '</div>';
                attachCardListeners();
                attachTiltEffect();
                return;
            }

            for(let s=3; s<=8; s++) {
                const panel = document.createElement('div');
                panel.className = 'semester-panel';
                panel.style.display = s.toString()===currentSemester ? '' : 'none';
                const isSingleCard = selectedCardCode && s.toString()===currentSemester;
                panel.innerHTML = renderSemesterContent(s, isSingleCard);
                mc.appendChild(panel);
            }
            attachCardListeners();
            attachGroupListeners();
            attachTiltEffect();
        }

        function renderSemesterContent(sem, isSingleCard) {
            let html = `<div class="semester-header"><h2 class="semester-title">${SEMESTER_DATA[sem].name}</h2>`;
            if (!isSingleCard) html += `<p class="semester-subtitle">Click any subject to focus</p>`;
            html += `</div>`;
            if (isSingleCard) {
                html += `<div class="back-bar visible"><button class="btn btn-back" onclick="showAllCards()">← Back (Esc)</button><button class="btn btn-ghost btn-sm" onclick="toggleReadingMode()">Reading Mode</button></div>`;
            } else {
                html += `<div class="search-bar"><input type="text" placeholder="Search within semester..." oninput="filterCards(this,'${sem}')"></div>`;
            }
            html += `<div class="subjects-grid" id="grid${sem}">`;
            if (isSingleCard) {
                const sub = getAllSubjects(sem).find(s => s.code === selectedCardCode);
                if (sub) html += renderCard(sem, sub, true);
            } else {
                html += renderAllCards(sem);
            }
            return html + '</div>';
        }

        function getAllSubjects(sem) { const d = SEMESTER_DATA[sem]; let all = [...(d.subjects||[])]; if(d.electives) Object.values(d.electives).forEach(a => all.push(...a)); return all; }
        function renderAllCards(sem) { const d = SEMESTER_DATA[sem]; let html = '', si = 0; if(d.subjects) d.subjects.forEach(s => { html += renderCard(sem, s, false, si); si++; }); if(d.electives) for(const[g,ss] of Object.entries(d.electives)) { html += `<div class="elective-group-label">${g}</div>`; ss.forEach(s => { html += renderCard(sem, s, false, si); si++; }); } return html; }

        function renderCard(sem, sub, isSelected, si=0) {
            const individualCats = isLabSubject(sub.title) ? LAB_INDIVIDUAL : INDIVIDUAL_CATEGORIES;
            const groupedCats = isLabSubject(sub.title) ? [] : GROUPED_CATEGORIES;
            const cc = isSelected ? 'subject-card selected-card' : 'subject-card fade-in-up';
            const sc = !isSelected && si < 16 ? ` stagger-${si+1}` : '';
            const hc = selectedCardCode && !isSelected ? ' hidden-card' : '';
            let h = `<div class="${cc}${sc}${hc}" data-code="${sub.code}" data-sem="${sem}">
                <div class="card-header"><div class="card-header-left"><div class="card-title">${sub.title}</div><div class="card-code">${sub.code}</div></div><span class="card-chevron">▾</span></div>
                <div class="card-expand"><div class="card-expand-inner">`;
            individualCats.forEach(c => {
                const notes = getNotes(sem, sub.code, c.key);
                h += renderCategoryBox(c.label, notes);
            });
            groupedCats.forEach(group => {
                const open = isGroupOpen(sem, sub.code, group.groupKey);
                const allNotes = group.subCategories.flatMap(sc => getNotes(sem, sub.code, sc.key));
                const hasContent = allNotes.length > 0;
                h += `<div class="grouped-section${open ? ' open' : ''}" data-group="${group.groupKey}">
                    <div class="grouped-section-header" onclick="event.stopPropagation();toggleGroup('${sem}','${sub.code}','${group.groupKey}')">
                        <span>${group.groupLabel} ${hasContent ? '('+allNotes.length+')' : ''}</span>
                        <span class="grouped-section-chevron">▾</span>
                    </div>
                    <div class="grouped-section-body"><div class="grouped-section-body-inner">`;
                group.subCategories.forEach(sc => {
                    const notes = getNotes(sem, sub.code, sc.key);
                    h += `<div class="sub-cat-title">${sc.label}</div>`;
                    if (notes.length === 0) h += '<span class="no-files">Empty</span>';
                    else notes.forEach(n => {
                        const icon = getFileIcon(n.driveUrl);
                        const dl = getDirectDownloadUrl(n.driveUrl);
                        h += `<a class="file-link" data-drive-url="${n.driveUrl}" href="javascript:void(0)"><span class="file-icon">${icon}</span>${n.label||'File'}<button class="file-download-btn" onclick="event.stopPropagation();event.preventDefault();downloadFile('${dl}','${(n.label||'file').replace(/'/g,"\\'")}')" title="Download">↓</button></a>`;
                    });
                });
                h += `</div></div></div>`;
            });
            h += '</div></div></div>';
            return h;
        }

        function renderCategoryBox(label, notes) {
            let h = `<div class="note-category"><div class="note-cat-title">${label}</div>`;
            if (notes.length === 0) h += '<span class="no-files">Empty</span>';
            else notes.forEach(n => {
                const icon = getFileIcon(n.driveUrl);
                const dl = getDirectDownloadUrl(n.driveUrl);
                h += `<a class="file-link" data-drive-url="${n.driveUrl}" href="javascript:void(0)"><span class="file-icon">${icon}</span>${n.label||'File'}<button class="file-download-btn" onclick="event.stopPropagation();event.preventDefault();downloadFile('${dl}','${(n.label||'file').replace(/'/g,"\\'")}')" title="Download">↓</button></a>`;
            });
            return h + '</div>';
        }

        window.downloadFile = function(url, name) { const a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); document.body.removeChild(a); showToast('Downloading...'); };
        window.toggleGroup = toggleGroup;

        function attachCardListeners() {
            document.querySelectorAll('.subject-card:not(.selected-card)').forEach(c => {
                c.addEventListener('click', function(e) {
                    if (e.target.closest('.file-link') || e.target.closest('iframe') || e.target.closest('button') || e.target.closest('.grouped-section-header')) return;
                    selectedCardCode = this.getAttribute('data-code');
                    renderPanels();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            });
            document.querySelectorAll('.file-link[data-drive-url]').forEach(l => {
                l.addEventListener('click', function(e) {
                    if (e.target.closest('button')) return;
                    e.stopPropagation();
                    const p = extractFileId(this.getAttribute('data-drive-url'));
                    if (p) {
                        document.getElementById('previewIframe').src = `https://drive.google.com/file/d/${p}/preview`;
                        document.getElementById('previewIframe').style.display = '';
                        document.getElementById('quickViewInput').style.display = 'none';
                        openPreviewModal();
                    }
                });
            });
        }
        function attachGroupListeners() { /* handled inline */ }
        function attachTiltEffect() {
            document.querySelectorAll('.subject-card:not(.selected-card)').forEach(c => {
                c.addEventListener('mousemove', function(e) {
                    const r = this.getBoundingClientRect(), x = e.clientX - r.left, y = e.clientY - r.top;
                    const cx = r.width / 2, cy = r.height / 2;
                    this.style.transform = `perspective(800px) rotateX(${(y-cy)/cy*-8}deg) rotateY(${(x-cx)/cx*8}deg) translateY(-6px)`;
                });
                c.addEventListener('mouseleave', function() { this.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) translateY(0px)'; });
            });
        }
        window.filterCards = function(input, sem) {
            const q = input.value.toLowerCase();
            document.querySelectorAll(`#grid${sem} .subject-card:not(.selected-card)`).forEach(c => {
                c.style.display = (!q || c.querySelector('.card-title').textContent.toLowerCase().includes(q)) ? '' : 'none';
            });
        };

        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
            if (e.key >= '3' && e.key <= '8') {
                e.preventDefault();
                clearGlobalSearch();
                currentSemester = e.key;
                selectedCardCode = null;
                openGroups = {};
                renderAll();
                showKcToast('Semester ' + e.key);
            }
            if (e.key === 'Escape') {
                e.preventDefault();
                if (document.getElementById('adminModalOverlay').classList.contains('open')) closeAdminModal();
                else if (document.getElementById('previewModalOverlay').classList.contains('open')) closePreview();
                else if (selectedCardCode) { showAllCards(); showKcToast('All Subjects'); }
            }
        });

        function openAdminModal() { document.getElementById('adminModalOverlay').classList.add('open'); populateAdminSemesters(); if(isAdmin){ document.getElementById('adminAuth').style.display='none'; document.getElementById('adminPanel').style.display=''; updateAdminSubjects(); updateAdminCategoryOptions(); refreshAdminExisting(); } else { document.getElementById('adminAuth').style.display=''; document.getElementById('adminPanel').style.display='none'; } }
        function closeAdminModal() { document.getElementById('adminModalOverlay').classList.remove('open'); }
        function openPreviewModal() { document.getElementById('previewModalOverlay').classList.add('open'); }
        function closePreview() { document.getElementById('previewModalOverlay').classList.remove('open'); document.getElementById('previewIframe').src=''; document.getElementById('previewIframe').style.display='none'; }
        document.getElementById('adminUploadBtn').addEventListener('click', openAdminModal);
        document.querySelectorAll('.modal-overlay').forEach(o => { o.addEventListener('click', function(e) { if(e.target === this) { this.classList.remove('open'); if(this.id === 'previewModalOverlay') closePreview(); } }); });

        function adminLogin() { if(document.getElementById('adminPassword').value==='btadmin2024'&&(githubToken=document.getElementById('githubToken').value.trim())){ isAdmin=true; document.getElementById('adminAuth').style.display='none'; document.getElementById('adminPanel').style.display=''; updateAdminSubjects(); updateAdminCategoryOptions(); refreshAdminExisting(); showToast('Admin unlocked'); } else showToast('Wrong password or token'); }
        function adminLogout() { isAdmin=false; document.getElementById('adminAuth').style.display=''; document.getElementById('adminPanel').style.display='none'; }
        function populateAdminSemesters() { const s=document.getElementById('adminSemester'); s.innerHTML=''; for(let i=3;i<=8;i++){ const o=document.createElement('option'); o.value=i; o.textContent='Semester '+i; s.appendChild(o); } }
        function updateAdminSubjects() { const d=SEMESTER_DATA[parseInt(document.getElementById('adminSemester').value)],s=document.getElementById('adminSubject'); s.innerHTML=''; [...(d.subjects||[]),...(d.electives?Object.values(d.electives).flat():[])].forEach(x=>{ const o=document.createElement('option'); o.value=x.code; o.textContent=x.code+' - '+x.title; o.dataset.title=x.title; s.appendChild(o); }); }
        function updateAdminCategoryOptions() { const s=document.getElementById('adminCategory'); const opt=document.getElementById('adminSubject').selectedOptions[0]; const title = opt ? (opt.dataset.title || opt.textContent.split(' - ')[1] || '') : ''; let allCats = []; if (isLabSubject(title)) { allCats = [...LAB_INDIVIDUAL]; } else { allCats = [...INDIVIDUAL_CATEGORIES]; GROUPED_CATEGORIES.forEach(g => { g.subCategories.forEach(sc => allCats.push(sc)); }); } s.innerHTML = ''; allCats.forEach(x => { const e = document.createElement('option'); e.value = x.key; e.textContent = x.label; s.appendChild(e); }); refreshAdminExisting(); }
        function refreshAdminExisting() { const n=getNotes(document.getElementById('adminSemester').value,document.getElementById('adminSubject').value,document.getElementById('adminCategory').value),d=document.getElementById('adminExistingFiles'); d.innerHTML=n.length?'':'No files yet.'; n.forEach((x,i)=>{ const e=document.createElement('div'); e.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:0.25rem 0;'; e.innerHTML=`<span>${x.label}</span><button style="background:#ef4444;color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:0.6rem;">x</button>`; e.querySelector('button').onclick=()=>{ const k=getNotesKey(document.getElementById('adminSemester').value,document.getElementById('adminSubject').value,document.getElementById('adminCategory').value); if(notesData[k]){notesData[k].splice(i,1);if(!notesData[k].length)delete notesData[k];saveLocal();refreshAdminExisting();renderPanels();showToast('Deleted');} }; d.appendChild(e); }); }
        async function commitToGithub() { try { const content=JSON.stringify(notesData,null,2); const base64=btoa(unescape(encodeURIComponent(content))); const getRes=await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/notes-data.json`,{headers:{Authorization:`token ${githubToken}`}}); const fi=await getRes.json(); await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/notes-data.json`,{method:'PUT',headers:{Authorization:`token ${githubToken}`,'Content-Type':'application/json'},body:JSON.stringify({message:'Update notes',content:base64,sha:fi.sha})}); return true; } catch(e) { return false; } }
        async function adminAddSingle() { const s=document.getElementById('adminSemester').value,c=document.getElementById('adminSubject').value; const cat=document.getElementById('adminCategory').value,l=document.getElementById('adminFileLabel').value.trim(); const u=document.getElementById('adminDriveLink').value.trim(); if(!l||!u) return showToast('Fill all fields'); if(!extractFileId(u)) return showToast('Invalid file link'); const k=getNotesKey(s,c,cat); if(!notesData[k]) notesData[k]=[]; notesData[k].push({label:l,driveUrl:u,addedAt:Date.now()}); saveLocal(); const ok=await commitToGithub(); showToast(ok?'Published!':'Saved locally'); document.getElementById('adminFileLabel').value=''; document.getElementById('adminDriveLink').value=''; refreshAdminExisting(); renderPanels(); }
        async function adminAddBulk() { const s=document.getElementById('adminSemester').value,c=document.getElementById('adminSubject').value; const cat=document.getElementById('adminCategory').value; const raw=document.getElementById('adminBulkLinks').value.trim(); if(!raw) return showToast('Paste some links first'); const lines=raw.split('\n').filter(l=>l.trim()); let added=0; for(const line of lines) { const parts=line.split('|'); if(parts.length<2) continue; const label=parts[0].trim(); const url=parts.slice(1).join('|').trim(); if(!label||!url) continue; if(!extractFileId(url)) continue; const k=getNotesKey(s,c,cat); if(!notesData[k]) notesData[k]=[]; notesData[k].push({label,driveUrl:url,addedAt:Date.now()}); added++; } if(added===0) return showToast('No valid links found'); saveLocal(); const ok=await commitToGithub(); showToast(ok?`${added} files published!`:`${added} files saved locally`); document.getElementById('adminBulkLinks').value=''; refreshAdminExisting(); renderPanels(); }
        window.adminAddSingle = adminAddSingle; window.adminAddBulk = adminAddBulk;
        function exportJSON() { const b=new Blob([JSON.stringify(notesData,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='notes-data.json'; a.click(); }
        function importJSON(e) { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{notesData=JSON.parse(ev.target.result);saveLocal();renderPanels();refreshAdminExisting();showToast('Imported');}; r.readAsText(f); e.target.value=''; }

        document.getElementById('quickViewBtn').addEventListener('click', ()=>{ document.getElementById('previewIframe').style.display='none'; document.getElementById('quickViewInput').style.display=''; openPreviewModal(); });
        window.quickPreview=function(){ const i=extractFileId(document.getElementById('quickDriveLink').value.trim()); if(i){ document.getElementById('previewIframe').src=`https://drive.google.com/file/d/${i}/preview`; document.getElementById('previewIframe').style.display=''; document.getElementById('quickViewInput').style.display='none'; } else showToast('Invalid link'); };

        document.getElementById('themeToggle').addEventListener('click', ()=>{ document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light'); });
        fetchLiveNotes();
    </script>
</body>
</html>
