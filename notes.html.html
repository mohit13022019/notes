        .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.5); color: #fff; }
        .semester-nav { display: flex; overflow-x: auto; background: var(--surface); padding: 0.5rem; gap: 0.3rem; position: sticky; top: 60px; z-index: 90; border-bottom: 1px solid var(--border); }

        .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .section-subtitle { color: var(--text-muted); margin-bottom: 1rem; }
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1rem; }
        .subject-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.2s; }
        .subject-card:hover { box-shadow: var(--shadow-md); }
        .subject-card.expanded { box-shadow: var(--shadow-lg); border-color: var(--accent); }
        .card-header { padding: 1rem; display: flex; align-items: center; gap: 0.8rem; }
        .card-icon { width: 40px; height: 40px; background: var(--accent-pale); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        .card-title { font-weight: 600; font-size: 0.9rem; }
        .card-code { font-size: 0.7rem; color: var(--text-muted); }
        .card-chevron { margin-left: auto; transition: 0.2s; }
        .subject-card.expanded .card-chevron { transform: rotate(180deg); }
        .card-type-badge { font-size: 0.6rem; padding: 0.2rem 0.5rem; border-radius: 10px; font-weight: 600; text-transform: uppercase; }
        .badge-pc { background: #e8f5e9; color: #2e7d32; } .badge-bs { background: #e3f2fd; color: #1565c0; }
        .badge-es { background: #fff3e0; color: #e65100; } .badge-hs { background: #fce4ec; color: #c62828; }
        .badge-ae { background: #f3e5f5; color: #6a1b9a; } .badge-pe { background: #e8eaf6; color: #283593; }
        .badge-oe { background: #e0f7fa; color: #00695c; } .badge-pw { background: #fff8e1; color: #f57f17; }
        .card-expand { max-height: 0; overflow: hidden; transition: max-height 0.4s; background: var(--surface-alt); }
        .subject-card.expanded .card-expand { max-height: 900px; border-top: 1px solid var(--border); }
        .card-expand-inner { padding: 0 1rem 1rem; }
        .note-category { margin-top: 0.8rem; }
        .note-cat-title { font-weight: 700; font-size: 0.8rem; margin-bottom: 0.3rem; }
        .file-link { display: inline-block; margin: 0.2rem; padding: 0.2rem 0.6rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; font-size: 0.75rem; text-decoration: none; color: var(--text); cursor: pointer; }
        .file-link:hover { border-color: var(--accent); background: var(--accent-pale); }
        .folder-embed { width: 100%; height: 250px; border: 1px solid var(--border); border-radius: 8px; margin-top: 0.3rem; }
        .no-files { color: var(--text-muted); font-style: italic; font-size: 0.75rem; }

        .search-bar-wrap input { width: 100%; padding: 0.5rem 1rem; border: 2px solid var(--border); border-radius: 20px; background: var(--surface); color: var(--text); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
        .modal { background: var(--surface); padding: 1.5rem; border-radius: 12px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal input, .modal select { width: 100%; padding: 0.5rem; margin: 0.3rem 0; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-alt); color: var(--text); }
        .toast-container { position: fixed; bottom: 1rem; right: 1rem; z-index: 300; }
        .toast { background: var(--primary); color: #fff; padding: 0.8rem 1.2rem; border-radius: 20px; margin-top: 0.5rem; font-size: 0.85rem; }
    </style>
</head>

            ],'OE-3 (Open Elective-3)':[
                {code:'23BT8OEFRS',title:'Forensic Science',type:'OE',icon:'F'},
                {code:'23BT8OEHAN',title:'Health and Nutrition',type:'OE',icon:'H'}
            ]}}
        };

        // Full categories for theory subjects
        const THEORY_CATEGORIES = [
            {key:'unit1',label:'Unit 1'},{key:'unit2',label:'Unit 2'},{key:'unit3',label:'Unit 3'},
            {key:'unit4',label:'Unit 4'},{key:'unit5',label:'Unit 5'},{key:'cie1',label:'CIE 1'},
            {key:'cie2',label:'CIE 2'},{key:'cie3',label:'CIE 3'},{key:'endsem',label:'Endsem'},
            {key:'textbook',label:'Textbook'},{key:'folder',label:'Folder Embed'}
        ];

        // Reduced categories for lab subjects
        const LAB_CATEGORIES = [
            {key:'labmanual',label:'Lab Manual'},
            {key:'folder',label:'Folder Embed'}
        ];

        function isLabSubject(title) {
            return title.toLowerCase().includes('lab');
        }

        function getCategoriesForSubject(title) {
            return isLabSubject(title) ? LAB_CATEGORIES : THEORY_CATEGORIES;
        }

        // Also use lab categories for Project and Seminar type subjects
        function getCategoriesForCode(type) {
            if (type === 'PW') return LAB_CATEGORIES;
            return THEORY_CATEGORIES;
        }

        // ============== GLOBAL STATE ==============
        let notesData = {};
        let currentSemester = '3';
        let isAdmin = false;
        let githubToken = '';

        // ============== LOAD NOTES ==============
        async function fetchLiveNotes() {
            try {
                const res = await fetch('./notes-data.json');
                if (res.ok) { notesData = await res.json(); showToast('Notes loaded from repository'); }
                else { notesData = JSON.parse(localStorage.getItem('bt_notes')||'{}'); showToast('Offline mode'); }
            } catch(e) {
                notesData = JSON.parse(localStorage.getItem('bt_notes')||'{}');
                showToast('Offline mode');
            }
            renderAll();
        }

        function saveLocal() { localStorage.setItem('bt_notes', JSON.stringify(notesData)); }

        function getNotesKey(sem,code,cat) { return `${sem}|${code}|${cat}`; }
        function getNotes(sem,code,cat) { return notesData[getNotesKey(sem,code,cat)] || []; }

        function extractFileId(url) {
            const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            return m ? m[1] : null;
        }
        function extractFolderId(url) {
            const m = url.match(/\/folders\/([a-zA-Z0-9_-]+)/) || url.match(/\/drive\/folders\/([a-zA-Z0-9_-]+)/);
            return m ? m[1] : null;
        }

        function showToast(msg, type='') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div'); t.className='toast '+type; t.textContent=msg;
            c.appendChild(t); setTimeout(()=>t.remove(), 3000);
        }

        // ============== RENDERING ==============
        function renderAll() { renderTabs(); renderPanels(); }
        function renderTabs() {
            const nav = document.getElementById('semesterNav'); nav.innerHTML='';
            for(let s=3; s<=8; s++) {
                const btn = document.createElement('button');
                btn.className = 'sem-tab' + (s.toString()===currentSemester?' active':'');
                btn.innerHTML = `Sem ${s} <span class="badge">${countSubjects(s)}</span>`;
                btn.onclick = ()=>{ currentSemester=s.toString(); renderAll(); };
                nav.appendChild(btn);
            }
        }
        function countSubjects(s) {
            const d = SEMESTER_DATA[s];
            return (d.subjects?.length||0) + (d.electives ? Object.values(d.electives).flat().length : 0);
        }
        function renderPanels() {
            const mc = document.getElementById('mainContainer'); mc.innerHTML='';
            for(let s=3; s<=8; s++) {
                const panel = document.createElement('div');
                panel.className = 'semester-panel';
                panel.style.display = s.toString()===currentSemester?'':'none';
                panel.id = 'semPanel'+s;
                panel.innerHTML = renderSemesterContent(s);
                mc.appendChild(panel);
            }
            attachCardListeners();
        }
        function renderSemesterContent(sem) {
            const d = SEMESTER_DATA[sem];
            let html = `<h2 class="section-title">${d.name}</h2><p class="section-subtitle">Core and elective subjects</p>
            <div class="search-bar-wrap"><input type="text" placeholder="Search subjects..." oninput="filterCards(this,'semPanel${sem}')"></div>
            <div class="subjects-grid">`;
            if(d.subjects) d.subjects.forEach(s=>html+=renderCard(sem,s));
            if(d.electives) {
                for(const [grp,subs] of Object.entries(d.electives)) {
                    html += `<div class="elective-group-label">${grp}</div>`;
                    subs.forEach(s=>html+=renderCard(sem,s));
                }
            }
            html += '</div>'; return html;
        }
        function renderCard(sem, sub) {
            const tc = {PC:'badge-pc',BS:'badge-bs',ES:'badge-es',HS:'badge-hs',AE:'badge-ae',PE:'badge-pe',OE:'badge-oe',PW:'badge-pw'}[sub.type]||'badge-pc';
            const categories = isLabSubject(sub.title) ? LAB_CATEGORIES : THEORY_CATEGORIES;
            let html = `<div class="subject-card" data-code="${sub.code}" data-sem="${sem}">
                <div class="card-header"><div class="card-icon">${sub.icon||'S'}</div>
                <div><div class="card-title">${sub.title}</div><div class="card-code">${sub.code}</div></div>
                <span class="card-type-badge ${tc}">${sub.type}</span>
                <span class="card-chevron">&#9660;</span></div>
                <div class="card-expand"><div class="card-expand-inner">`;
            categories.forEach(cat=>{
                const notes = getNotes(sem, sub.code, cat.key);
                html += `<div class="note-category"><div class="note-cat-title">${cat.label}</div>`;
                if(notes.length===0) html += '<span class="no-files">No files</span>';
                else if(cat.key==='folder') {
                    notes.forEach(n=>{
                        const eid = extractFolderId(n.driveUrl);
                        if(eid) html += `<iframe class="folder-embed" src="https://drive.google.com/embeddedfolderview?id=${eid}#list"></iframe>`;
                        else html += '<span class="no-files">Invalid folder link</span>';
                    });
                } else {
                    notes.forEach(n=>html += `<a class="file-link" data-drive-url="${n.driveUrl}" href="javascript:void(0)">[File] ${n.label||'File'}</a>`);
                }
                html += '</div>';
            });
            html += '</div></div></div>';
            return html;
        }
                function attachCardListeners() {
                document.querySelectorAll('.subject-card').forEach(card=>{
                card.addEventListener('click', function(e) {
                    if(e.target.closest('.file-link')||e.target.closest('iframe')||e.target.closest('button')) return;
                    // Close all other cards first
                    document.querySelectorAll('.subject-card').forEach(c => {
                        if (c !== this) c.classList.remove('expanded');
                    });
                    // Toggle this card
                    this.classList.toggle('expanded');
                });
            });
            document.querySelectorAll('.file-link[data-drive-url]').forEach(link=>{
                link.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const url = this.getAttribute('data-drive-url');
                    const pid = extractFileId(url);
                    if(pid) {
                        document.getElementById('previewIframe').src = `https://drive.google.com/file/d/${pid}/preview`;
                        document.getElementById('previewIframe').style.display='';
                        document.getElementById('quickViewInput').style.display='none';
                        document.getElementById('previewModalOverlay').style.display='flex';
                    }
                });
            });
        }
        window.filterCards = function(input, panelId) {
            const q = input.value.toLowerCase();
            document.querySelectorAll(`#${panelId} .subject-card`).forEach(card=>{
                const t = (card.querySelector('.card-title')?.textContent||'').toLowerCase();
                card.style.display = (!q || t.includes(q)) ? '' : 'none';
            });
        };

        // ============== ADMIN ==============
        document.getElementById('adminUploadBtn').addEventListener('click', ()=>{
            document.getElementById('adminModalOverlay').style.display='flex';
            populateAdminSemesters();
            if(isAdmin) { document.getElementById('adminAuth').style.display='none'; document.getElementById('adminPanel').style.display=''; updateAdminSubjects(); updateAdminCategoryOptions(); refreshAdminExisting(); }
            else { document.getElementById('adminAuth').style.display=''; document.getElementById('adminPanel').style.display='none'; }
        });

        function adminLogin() {
            const pw = document.getElementById('adminPassword').value;
            githubToken = document.getElementById('githubToken').value.trim();
            if(pw==='btadmin2024' && githubToken) {
                isAdmin = true;
                document.getElementById('adminAuth').style.display='none';
                document.getElementById('adminPanel').style.display='';
                populateAdminSemesters(); updateAdminSubjects(); updateAdminCategoryOptions(); refreshAdminExisting();
                showToast('Admin unlocked – live sync active');
            } else showToast('Wrong password or missing token');
        }
        function adminLogout() { isAdmin=false; document.getElementById('adminAuth').style.display=''; document.getElementById('adminPanel').style.display='none'; showToast('Locked'); }

        function populateAdminSemesters() {
            const sel = document.getElementById('adminSemester'); sel.innerHTML='';
            for(let s=3;s<=8;s++) { const o = document.createElement('option'); o.value=s; o.textContent='Semester '+s; sel.appendChild(o); }
            sel.value = currentSemester;
        }
        function updateAdminSubjects() {
            const sem = document.getElementById('adminSemester').value;
            const sel = document.getElementById('adminSubject'); sel.innerHTML='';
            const d = SEMESTER_DATA[parseInt(sem)];
            const all = [...(d.subjects||[])];
            if(d.electives) Object.values(d.electives).forEach(a=>all.push(...a));
            all.forEach(s=>{ const o=document.createElement('option'); o.value=s.code; o.textContent=s.code+' - '+s.title; o.dataset.title = s.title; sel.appendChild(o); });
            updateAdminCategoryOptions();
        }
        function updateAdminCategoryOptions() {
            const sel = document.getElementById('adminCategory');
            const subjectSel = document.getElementById('adminSubject');
            const selectedOption = subjectSel.options[subjectSel.selectedIndex];
            const title = selectedOption ? selectedOption.dataset.title || selectedOption.textContent.split(' - ')[1] || '' : '';
            const categories = isLabSubject(title) ? LAB_CATEGORIES : THEORY_CATEGORIES;
            sel.innerHTML = '';
            categories.forEach(cat => {
                const o = document.createElement('option');
                o.value = cat.key;
                o.textContent = cat.label;
                sel.appendChild(o);
            });
            refreshAdminExisting();
        }
        function refreshAdminExisting() {
            const sem = document.getElementById('adminSemester').value;
            const code = document.getElementById('adminSubject').value;
            const cat = document.getElementById('adminCategory').value;
            const div = document.getElementById('adminExistingFiles');
            const notes = getNotes(sem,code,cat);
            div.innerHTML = notes.length ? '' : 'No files yet.';
            notes.forEach((n,i)=>{
                div.innerHTML += `<div>[${cat==='folder'?'Folder':'File'}] ${n.label} <button onclick="removeNoteAndRefresh('${sem}','${code}','${cat}',${i})" style="background:red;color:#fff;border:none;border-radius:50%;cursor:pointer;">x</button></div>`;
            });
        }
        function removeNoteAndRefresh(sem,code,cat,idx) {
            const key = getNotesKey(sem,code,cat);
            if(notesData[key]) { notesData[key].splice(idx,1); if(!notesData[key].length) delete notesData[key]; saveLocal(); refreshAdminExisting(); renderPanels(); }
        }

        async function adminAddAndCommit() {
            const sem = document.getElementById('adminSemester').value;
            const code = document.getElementById('adminSubject').value;
            const cat = document.getElementById('adminCategory').value;
            const label = document.getElementById('adminLabel').value.trim();
            const url = document.getElementById('adminDriveLink').value.trim();
            if(!label||!url) return showToast('Fill all fields');
            if(cat==='folder' && !extractFolderId(url)) return showToast('Invalid folder link');
            if(cat!=='folder' && !extractFileId(url)) return showToast('Invalid file link');
            const key = getNotesKey(sem,code,cat);
            if(!notesData[key]) notesData[key] = [];
            notesData[key].push({label, driveUrl:url, addedAt:Date.now()});
            saveLocal();
            try {
                const content = JSON.stringify(notesData, null, 2);
                const base64 = btoa(unescape(encodeURIComponent(content)));
                const getRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/notes-data.json`, {
                    headers: { Authorization: `token ${githubToken}` }
                });
                const fi = await getRes.json();
                await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/notes-data.json`, {
                    method: 'PUT',
                    headers: { Authorization: `token ${githubToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'Update notes', content: base64, sha: fi.sha })
                });
                showToast('Published! Everyone sees it now.');
            } catch(e) { showToast('GitHub sync failed – check token/repo name. Saved locally.'); }
            refreshAdminExisting(); renderPanels();
        }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(notesData,null,2)],{type:'application/json'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='notes-data.json'; a.click();
        }
        function importJSON(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = ev => { notesData = JSON.parse(ev.target.result); saveLocal(); renderPanels(); refreshAdminExisting(); showToast('Imported locally'); };
            r.readAsText(f); e.target.value='';
        }

        // ============== PREVIEW ==============
        document.getElementById('quickViewBtn').addEventListener('click', ()=>{
            document.getElementById('previewIframe').style.display='none';
            document.getElementById('quickViewInput').style.display='';
            document.getElementById('previewModalOverlay').style.display='flex';
        });
        function closePreview() {
            document.getElementById('previewModalOverlay').style.display='none';
            document.getElementById('previewIframe').src='';
            document.getElementById('previewIframe').style.display='none';
        }
        window.quickPreview = function() {
            const url = document.getElementById('quickDriveLink').value.trim();
            const id = extractFileId(url);
            if(id) {
                document.getElementById('previewIframe').src = `https://drive.google.com/file/d/${id}/preview`;
                document.getElementById('previewIframe').style.display='';
                document.getElementById('quickViewInput').style.display='none';
            } else showToast('Invalid file link');
        };

        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', ()=>{
            document.body.classList.toggle('dark');
            document.getElementById('themeToggle').innerHTML = document.body.classList.contains('dark') ? '&#9789;' : '&#9788;';
            localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light');
        });
        (()=>{ const t = localStorage.getItem('theme')||'light'; document.body.classList.add(t); document.getElementById('themeToggle').innerHTML = t==='dark'?'&#9789;':'&#9788;'; })();

        // Close modals
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) { if(e.target === this) { this.style.display='none'; closePreview(); } });
        });

        // Start
        fetchLiveNotes();
    </script>
</body>
</html>
